<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signatures - MyPathoLabs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased selection:bg-brand-200 selection:text-brand-900">
    
    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

    <div class="flex h-screen overflow-hidden bg-slate-100">
        <!-- Sidebar Injected via JS -->
        
        <main class="flex-1 relative overflow-y-auto focus:outline-none custom-scrollbar pb-12">
            <!-- Header -->
            <header class="bg-white border-b border-slate-200 flex items-center justify-between px-8 py-5 sticky top-0 z-10">
                <div class="flex-1 w-full max-w-2xl flex relative opacity-0"></div>
                <!-- Breadcrumbs -->
                <nav class="flex absolute left-8 top-1/2 transform -translate-y-1/2" aria-label="Breadcrumb">
                  <ol class="inline-flex items-center space-x-1 md:space-x-3 text-sm font-medium">
                    <li class="inline-flex items-center text-slate-500 hover:text-brand-600 transition-colors">
                      <a href="dashboard.html" class="inline-flex items-center"><i class="fas fa-home mr-2"></i>Dashboard</a>
                    </li>
                    <li>
                      <div class="flex items-center">
                        <i class="fas fa-chevron-right text-slate-400 text-xs mx-2"></i>
                        <span class="text-slate-800 font-bold">Signatures</span>
                      </div>
                    </li>
                  </ol>
                </nav>
            </header>

            <div class="px-8 py-8 max-w-[1200px] mx-auto">
                <div class="mb-8">
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center mt-2 group">
                        <i class="fas fa-signature text-brand-500 mr-3 group-hover:scale-110 transition-transform"></i>
                        Manage Signatures
                    </h1>
                    <p class="text-slate-500 mt-2 text-sm max-w-xl leading-relaxed">Add and manage doctor signatures for verifying lab reports.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    
                    <!-- Upload Form -->
                    <div class="lg:col-span-1" id="add-signature-container">
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sticky top-28">
                            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center">
                                <i class="fas fa-plus-circle text-brand-500 mr-2"></i> Add New Signature
                            </h2>
                            <form id="signature-form" onsubmit="addSignature(event)">
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-sm font-bold text-slate-700 mb-1.5" for="doctor-name">Doctor Name</label>
                                        <input type="text" id="doctor-name" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-brand-500 focus:ring focus:ring-brand-500/20 transition-all text-sm font-medium disabled:bg-slate-100 disabled:text-slate-500" placeholder="e.g. Dr. John Doe">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Signature Image</label>
                                        
                                        <!-- Image Preview Container -->
                                        <div id="signature-preview-container" class="mb-4 h-32 bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center overflow-hidden transition-colors hover:border-brand-300">
                                            <img id="signature-preview" src="" class="max-h-full object-contain hidden" alt="Signature Preview">
                                            <span id="signature-placeholder" class="text-slate-400 text-center">
                                                <i class="fas fa-signature text-3xl mb-2 block"></i>
                                                <span class="text-xs font-medium">No Image Uploaded</span>
                                            </span>
                                        </div>

                                        <div class="flex items-center space-x-3">
                                            <input type="file" id="signature-file" accept="image/*" class="hidden" onchange="uploadSignature()">
                                            <button type="button" onclick="document.getElementById('signature-file').click()" id="btn-upload-trigger" class="flex-1 bg-white border border-slate-200 text-sm font-bold text-slate-700 py-2.5 rounded-xl shadow-sm hover:bg-slate-50 hover:shadow transition-all transform hover:-translate-y-0.5">
                                                <i class="fas fa-cloud-upload-alt mr-2 text-brand-500"></i> Upload Signature
                                            </button>
                                            <button type="button" onclick="clearSignatureImage()" id="btn-clear-signature" class="hidden text-red-500 hover:text-red-700 text-sm font-bold hover:bg-red-50 px-4 py-2.5 rounded-xl transition-colors">
                                                <i class="fas fa-trash-alt"></i>
                                            </button>
                                        </div>
                                        <input type="hidden" id="signature-url">
                                        <p class="text-[10px] text-slate-500 mt-2">Upload a clean, transparent PNG of the signature.</p>
                                    </div>
                                    <button type="button" onclick="addSignature(event)" id="btn-add-sign" class="w-full bg-brand-500 text-white font-bold rounded-xl py-2.5 mt-2 hover:bg-brand-600 transition-all shadow-md hover:-translate-y-0.5">
                                        Save Signature
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Signatures List -->
                    <div class="lg:col-span-2">
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="px-6 py-5 border-b border-slate-100 bg-slate-50/50">
                                <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider">Available Signatures</h3>
                            </div>
                            <div class="p-6">
                                <div id="signatures-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <!-- Dynamic content -->
                                    <div class="col-span-full text-center py-8 text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i> Loading signatures...</div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Centralized JS -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/signatures.js"></script>
</body>
</html>
