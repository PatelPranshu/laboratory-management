<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Report - MyPathoLabs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 antialiased text-slate-800 selection:bg-brand-500 selection:text-white">

    <div class="flex h-screen overflow-hidden bg-slate-100">
        
        <!-- Sidebar Layout Injected via JS -->

        <!-- Main Content -->
        <main class="flex-1 relative overflow-y-auto focus:outline-none custom-scrollbar pb-12">
            
            <!-- Top Header (Fixed Action Bar) -->
            <header class="bg-white border-b border-slate-200 sticky top-0 z-[100] shadow-sm">
                <div class="px-8 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
                    <div class="flex items-center gap-6">
                        <!-- Breadcrumbs & Title -->
                        <div>
                            <nav class="flex text-xs font-semibold text-slate-400 mb-1" aria-label="Breadcrumb">
                                <ol class="inline-flex items-center space-x-2">
                                    <li class="hover:text-brand-600 transition-colors"><a href="dashboard.html">Dashboard</a></li>
                                    <li><i class="fas fa-chevron-right text-[10px] opacity-50"></i></li>
                                    <li class="text-slate-600">Reports</li>
                                </ol>
                            </nav>
                            <h1 class="text-xl font-bold text-slate-800 tracking-tight" id="page-title">Draft New Report</h1>
                        </div>

                        <!-- Header Patient Info (Visible when selected) -->
                        <div id="header-patient-info" class="hidden border-l border-slate-200 pl-6 animate-fade-in">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 mr-3 shadow-inner">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-bold text-slate-800" id="header-sp-name">Patient Name</p>
                                    <p class="text-[11px] font-medium text-slate-500" id="header-sp-details">Details Loading...</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Actions Area -->
                    <div class="flex items-center gap-3 w-full md:w-auto">
                        <button type="button" onclick="handleHeaderCancel()" class="px-4 py-2.5 text-xs font-bold text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-xl transition-all">Cancel</button>
                        
                        <div id="action-wrapper" class="relative">
                            <!-- State 1: Save Button -->
                            <button id="btn-save-report" onclick="saveReport()" class="px-8 py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-bold text-xs rounded-xl shadow-lg shadow-brand-500/20 transform hover:-translate-y-0.5 transition-all flex items-center justify-center whitespace-nowrap">
                                <i class="fas fa-save mr-2"></i> Save Report
                            </button>

                            <!-- State 2: Share Actions (Visible on Success) -->
                            <div id="header-post-save-actions" class="hidden flex items-center gap-2 animate-scale-in">
                                <div class="flex items-center bg-brand-50 text-brand-600 px-3 py-2 rounded-xl border border-brand-100 mr-2" id="header-status-wrapper">
                                    <i class="fas fa-check-circle mr-2" id="header-status-icon"></i> <span class="text-[10px] font-bold uppercase tracking-wider" id="header-status-badge">Draft</span>
                                </div>
                                
                                <button onclick="downloadPdf()" class="p-2.5 bg-white text-red-600 hover:bg-red-50 border border-slate-200 rounded-xl transition-all shadow-sm group" title="Download PDF">
                                    <i class="fas fa-file-pdf text-lg group-hover:scale-110 transition-transform"></i>
                                </button>

                                <button onclick="sendReport('whatsapp')" class="p-2.5 bg-white text-emerald-600 hover:bg-emerald-50 border border-slate-200 rounded-xl transition-all shadow-sm group" title="Share via WhatsApp">
                                    <i class="fab fa-whatsapp text-xl group-hover:scale-110 transition-transform"></i>
                                </button>

                                <button onclick="sendReport('email')" class="p-2.5 bg-white text-brand-600 hover:bg-brand-50 border border-slate-200 rounded-xl transition-all shadow-sm group" title="Send via Email">
                                    <i class="fas fa-envelope text-lg group-hover:scale-110 transition-transform"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Micro-status bar -->
                <div class="bg-slate-50 px-8 py-1.5 border-t border-slate-100 flex justify-between items-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" id="last-saved-info">Report not yet saved</p>
                    <div class="flex items-center gap-4 text-[10px] font-bold text-slate-400">
                        <span class="flex items-center"><i class="fas fa-check-circle text-emerald-500 mr-1"></i> Auto-Draft Active</span>
                    </div>
                </div>
            </header>

            <div class="px-8 py-8 max-w-5xl mx-auto">
                <input type="hidden" id="report-id">
                <input type="hidden" id="report-status">

                <!-- 1. Patient Selection -->
                <div id="patient-selection-container" class="glass-card mb-8 relative z-50">
                    <div class="px-7 py-5 border-b border-slate-100/50 bg-white/40">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center">
                            <span class="flex items-center justify-center w-6 h-6 rounded-full bg-brand-100 text-brand-600 text-xs mr-3">1</span> 
                            Select Patient
                        </h2>
                    </div>
                    <div class="p-6">
                        <div id="search-input-container" class="relative group">
                            <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 group-focus-within:text-brand-500 transition-colors"></i>
                            <input type="text" id="patient-search-input" placeholder="Search by name, ID, or phone..." class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:bg-white transition-all font-medium text-slate-800 shadow-inner">
                            <div id="patient-search-results" class="absolute z-30 bg-white w-full border border-slate-200 rounded-xl shadow-xl hidden max-h-60 overflow-y-auto mt-2"></div>
                        </div>
                        
                        <!-- Hidden Patient Confirmation (Logic handles visibility) -->
                        <div id="selected-patient-card" class="bg-gradient-to-r from-emerald-50 to-brand-50 border border-emerald-100 rounded-2xl p-6 hidden mt-4 flex justify-between items-center animate-fade-in shadow-sm">
                            <div class="flex items-center">
                                <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center text-brand-600 mr-4 shadow-sm border border-brand-100">
                                    <i class="fas fa-user-check text-xl"></i>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[10px] font-black text-brand-600 uppercase tracking-widest mb-0.5">Ready to Generate Report for</span>
                                    <p class="text-xl font-bold text-slate-800" id="sp-name">Patient Name</p>
                                    <p class="text-xs font-medium text-slate-500 mt-0.5" id="sp-details">Phone - Age/Gender</p>
                                    <input type="hidden" id="sp-id">
                                </div>
                            </div>
                            <button onclick="clearPatient()" class="px-4 py-2 text-xs font-bold text-slate-400 hover:text-red-500 hover:bg-white rounded-xl transition-all border border-transparent hover:border-red-100 shadow-sm" title="Remove Patient">
                                <i class="fas fa-user-times mr-2"></i> Change Patient
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 2. Document Setup -->
                <div class="glass-card mb-8">
                     <div class="px-7 py-5 border-b border-slate-100/50 bg-white/40">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center">
                            <span class="flex items-center justify-center w-6 h-6 rounded-full bg-brand-100 text-brand-600 text-xs mr-3">2</span> 
                            Document Setup
                        </h2>
                    </div>
                    <div class="p-8 space-y-8">
                         <!-- Referred By (Mandatory) -->
                         <div class="max-w-md">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Referred By <span class="text-red-500">*</span></label>
                            <div class="relative group">
                                <i class="fas fa-user-md absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 group-focus-within:text-brand-500 transition-colors"></i>
                                <input type="text" id="report-referred-by" placeholder="Dr. Name or Clinic Name..." class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:bg-white text-sm font-medium text-slate-800 transition-all shadow-inner">
                            </div>
                         </div>

                         <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Select Templates <span class="text-xs font-normal text-slate-400 lowercase italic">(Combine multiple tests)</span></label>
                            <div id="templates-checkbox-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                <p class="text-sm text-slate-400 italic">Preparing templates...</p>
                            </div>
                         </div>
                    </div>
                </div>

                <!-- Report Editor -->
                <div class="glass-card mb-6 shadow-md">
                     <div class="px-7 py-5 border-b border-slate-100/50 bg-white/40 flex justify-between items-center">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center">
                            <span class="flex items-center justify-center w-6 h-6 rounded-full bg-brand-100 text-brand-600 text-xs mr-3">3</span> 
                            Edit Test Results
                        </h2>
                        <button onclick="addReportSection()" class="text-sm font-bold text-brand-600 hover:text-brand-800 focus:outline-none transition-colors px-3 py-1.5 rounded-lg hover:bg-brand-50">
                            <i class="fas fa-plus mr-1"></i> Add Custom Section
                        </button>
                     </div>

                     <div id="report-sections-container" class="p-6 space-y-8">
                         <!-- Report Sections Injected Here -->
                     </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Template for Report Section -->
    <template id="report-sec-template">
        <div class="rep-section bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm relative group">
            <!-- Decorative left border -->
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-brand-400"></div>
            
            <div class="bg-slate-50/80 px-5 py-4 border-b border-slate-100 flex justify-between items-center ml-1">
                <input type="text" class="rs-name font-bold text-slate-800 bg-transparent border-b-2 border-transparent hover:border-slate-300 focus:border-brand-500 focus:outline-none p-1 w-2/3 transition-colors text-lg" placeholder="Section Name (e.g., Complete Blood Count)">
                <button onclick="this.closest('.rep-section').remove()" class="text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors focus:outline-none" title="Remove Section"><i class="fas fa-trash-alt"></i></button>
            </div>
            <div class="p-6 ml-1 space-y-5">
                <div>
                     <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Remarks / Summary Text</label>
                     <textarea class="rs-text w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:bg-white text-sm font-medium text-slate-700 transition-all resize-none shadow-inner" rows="2" placeholder="Descriptive findings or remarks..."></textarea>
                </div>
                <div>
                     <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Parameters & Values</label>
                     <div class="rs-params space-y-3">
                         <!-- Params injected here -->
                     </div>
                     <button onclick="addParamLine(this)" class="mt-4 inline-flex items-center px-3 py-1.5 border border-brand-200 shadow-sm text-xs font-bold rounded-lg text-brand-600 bg-brand-50 hover:bg-brand-100 focus:outline-none transition-colors">
                        <i class="fas fa-plus mr-1.5"></i> Add Data Row
                     </button>
                </div>
            </div>
        </div>
    </template>

    <!-- Template for Parameter Line -->
    <template id="param-line-template">
        <div class="param-line bg-white p-3 rounded-xl border border-slate-100 hover:border-brand-200 transition-all shadow-sm group">
            <div class="flex flex-wrap items-center gap-4">
                <!-- Test Name -->
                <div class="flex-1 min-w-[180px]">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Test Name</label>
                    <input type="text" class="p-name w-full px-0 py-1 bg-transparent border-b border-transparent group-hover:border-slate-100 font-bold text-slate-700 focus:outline-none focus:border-brand-500 transition-all" placeholder="Test Name">
                </div>
                
                <!-- Result & Units -->
                <div class="flex-1 min-w-[140px]">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Result & Units</label>
                    <div class="flex items-center gap-2">
                        <input type="text" class="p-result w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-brand-700 focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all outline-none" placeholder="Result" oninput="checkAbnormal(this)">
                        <input type="text" class="p-units-input w-20 px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold text-slate-400 focus:ring-2 focus:ring-brand-500 focus:bg-white outline-none" placeholder="Unit">
                    </div>
                </div>

                <!-- Normal Range Input -->
                <div class="flex-1 min-w-[180px]">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Normal Range Reference</label>
                    <input type="text" class="p-normal-input w-full px-3 py-2 bg-emerald-50/50 border border-emerald-100 rounded-lg text-xs font-medium text-emerald-700 focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all outline-none" placeholder="e.g. 14 - 16" oninput="checkAbnormal(this)">
                </div>

                <!-- Delete Action -->
                <div class="flex-shrink-0">
                    <button onclick="this.closest('.param-line').remove()" class="text-slate-300 hover:text-red-500 p-2 rounded-lg transition-colors focus:outline-none hover:bg-red-50"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        </div>
    </template>

    <script src="js/layout.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        let templatesData = [];
        let currentPatient = null;

        document.addEventListener('DOMContentLoaded', async () => {
             loadCommonLayout();
             checkAuth();
             await loadTemplatesCheckboxes();

             // Check URL params
             const urlParams = new URLSearchParams(window.location.search);
             const editId = urlParams.get('edit');
             const patientId = urlParams.get('patient');

             if (editId) {
                 await loadExistingReport(editId);
             } else if (patientId) {
                 await selectPatientById(patientId);
                 addReportSection(); // empty section
             } else {
                 // Try loading draft if not editing or specific patient requested
                 const draft = DraftManager.load('report');
                 if (draft) {
                     if (draft.patient) await selectPatientById(draft.patient._id);
                     if (draft.sections && draft.sections.length > 0) {
                         document.getElementById('report-sections-container').innerHTML = '';
                         draft.sections.forEach(sec => {
                             const block = addReportSection();
                             block.querySelector('.rs-name').value = sec.sectionName || '';
                             block.querySelector('.rs-text').value = sec.text || '';
                             if (sec.parameters) {
                                 const btn = block.querySelector('button[onclick="addParamLine(this)"]');
                                 sec.parameters.forEach(p => addParamLine(btn, p));
                             }
                         });
                     } else {
                        addReportSection(); 
                     }
                     // Restore templates checkboxes
                     if (draft.templateIds) {
                         document.querySelectorAll('#templates-checkbox-container input[type="checkbox"]').forEach(cb => {
                             if (draft.templateIds.includes(cb.value)) cb.checked = true;
                         });
                     }
                 } else {
                    addReportSection(); // empty section
                 }
             }

             setupPatientSearch();

             // Auto-save listeners
             document.getElementById('report-sections-container').addEventListener('input', () => {
                 toggleActionState('editing');
                 saveReportDraft();
             });
        });

        async function loadTemplatesCheckboxes() {
             try {
                 const res = await api.request('/templates');
                 templatesData = res.data;
                 const container = document.getElementById('templates-checkbox-container');
                 container.innerHTML = '';
                 
                 if (templatesData.length === 0) {
                     container.innerHTML = '<p class="text-sm text-slate-400 italic">No templates found.</p>';
                     return;
                 }
                 
                 templatesData.forEach(t => {
                     const wrapper = document.createElement('label');
                     wrapper.className = 'flex items-center space-x-3 p-3 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-brand-50 hover:border-brand-200 transition-colors shadow-sm';
                     wrapper.innerHTML = `
                         <input type="checkbox" class="w-4 h-4 text-brand-600 border-slate-300 rounded focus:ring-brand-500" value="${t._id}" onchange="toggleTemplate(this, '${t._id}')">
                         <span class="text-sm font-bold text-slate-700 truncate" title="${t.templateName}">${t.templateName}</span>
                     `;
                     container.appendChild(wrapper);
                 });
             } catch (err) {
                 const container = document.getElementById('templates-checkbox-container');
                 if(container) container.innerHTML = '<p class="text-sm text-red-500 italic">Error loading templates.</p>';
             }
        }

        // Patient Search Logic
        function setupPatientSearch() {
            const input = document.getElementById('patient-search-input');
            const results = document.getElementById('patient-search-results');
            let debounce;
            let abortController = null;

            input.addEventListener('input', (e) => {
                clearTimeout(debounce);
                const query = e.target.value.trim();
                
                if (query.length < 2) {
                    results.classList.add('hidden');
                    return;
                }

                // Immediate loading feedback
                results.innerHTML = `
                    <div class="p-6 text-center animate-pulse">
                        <i class="fas fa-circle-notch fa-spin text-brand-600 mb-2"></i>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Searching Patients...</p>
                    </div>
                `;
                results.classList.remove('hidden');

                debounce = setTimeout(async () => {
                    if (abortController) abortController.abort();
                    abortController = new AbortController();

                    try {
                        const res = await api.request(`/patients?search=${encodeURIComponent(query)}&limit=8`, 'GET', null, abortController.signal);
                        
                        if (res.data.length === 0) {
                            results.innerHTML = `
                                <div class="p-6 text-center">
                                    <div class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3 border border-slate-100 text-slate-300">
                                        <i class="fas fa-user-slash text-sm"></i>
                                    </div>
                                    <p class="text-sm font-bold text-slate-800">No patients found</p>
                                    <button type="button" onclick="openPatientModal()" class="inline-block mt-2 text-xs font-bold text-brand-600 hover:text-brand-700 hover:underline focus:outline-none">
                                        <i class="fas fa-user-plus mr-1"></i> Add new patient
                                    </button>
                                </div>`;
                        } else {
                            results.innerHTML = `
                                <div class="px-5 py-2.5 bg-slate-50 border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Select Patient</div>
                                <div class="max-h-64 overflow-y-auto">
                                    ${res.data.map(p => `
                                        <div class="px-5 py-3.5 hover:bg-brand-50 cursor-pointer border-b border-slate-50 last:border-0 transition-all group" onclick='selectPatient(${JSON.stringify(p)})'>
                                            <div class="flex items-center">
                                                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-50 to-brand-50 text-indigo-700 font-bold flex items-center justify-center text-xs mr-4 border border-white shadow-sm flex-shrink-0 group-hover:scale-110 transition-transform">${p.name.charAt(0)}</div>
                                                <div class="overflow-hidden">
                                                    <p class="font-bold text-slate-800 text-sm truncate group-hover:text-brand-700 transition-colors">${p.name}</p>
                                                    <p class="text-[10px] font-medium text-slate-400 mt-1 flex items-center">
                                                        <span class="truncate"><i class="fas fa-phone-alt text-[9px] mr-1.5 opacity-60"></i>${p.phone}</span>
                                                        <span class="mx-2 opacity-30">&bull;</span>
                                                        <span class="whitespace-nowrap"><i class="fas fa-user text-[9px] mr-1.5 opacity-60"></i>${p.age}y / ${p.gender.charAt(0)}</span>
                                                    </p>
                                                </div>
                                                <i class="fas fa-chevron-right ml-auto text-[10px] text-slate-300 group-hover:text-brand-400 transition-colors"></i>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>`;
                        }
                        results.classList.remove('hidden');
                    } catch (err) {
                        if (err.name === 'AbortError') return;
                        console.error('Patient search error', err);
                        results.classList.add('hidden');
                    }
                }, 400); // Debounce
            });

            // Close dropdown on outside click
            document.addEventListener('click', e => {
                if(!input.contains(e.target) && !results.contains(e.target)) results.classList.add('hidden');
            });
        }

        async function selectPatientById(id) {
            try {
                const res = await api.request(`/patients/${id}`);
                selectPatient(res.data);
            } catch (err) {
                UI.showToast('Failed to load patient info', 'error');
            }
        }

        function selectPatient(p) {
            document.getElementById('patient-search-results').classList.add('hidden');
            document.getElementById('patient-search-input').value = '';
            
            currentPatient = p;
            document.getElementById('sp-id').value = p._id;
            document.getElementById('sp-name').textContent = p.name;
            const detailsHtml = `<span class="bg-white px-2 py-1 rounded-md border border-brand-100 shadow-sm"><i class="fas fa-phone mr-1.5 text-brand-400 opacity-70"></i>${p.phone}</span> <span class="bg-white px-2 py-1 rounded-md border border-brand-100 shadow-sm ml-2"><i class="fas fa-calendar mr-1.5 text-brand-400 opacity-70"></i>${p.age}y</span> <span class="bg-white px-2 py-1 rounded-md border border-brand-100 shadow-sm ml-2 font-bold text-brand-600">${p.gender}</span>`;
            document.getElementById('sp-details').innerHTML = detailsHtml;
            
            // Update Header Info
            document.getElementById('header-sp-name').textContent = p.name;
            document.getElementById('header-sp-details').textContent = `${p.phone} • ${p.age}y / ${p.gender}`;
            document.getElementById('header-patient-info').classList.remove('hidden');

            document.getElementById('patient-selection-container').classList.add('hidden');
            document.getElementById('selected-patient-card').classList.remove('hidden');

            // Re-run abnormal checks if patient changed (gender-specific ranges might change)
            document.querySelectorAll('.p-result').forEach(input => checkAbnormal(input));
        }

        function handleHeaderCancel() {
            // If we have a patient selected, just clear it and show search again
            if (currentPatient) {
                clearPatient();
            } else {
                // No patient selected, act as a global cancel and return to dashboard
                window.location.href = 'dashboard.html';
            }
        }

        function clearPatient() {
            currentPatient = null;
            document.getElementById('sp-id').value = '';
            document.getElementById('selected-patient-card').classList.add('hidden');
            document.getElementById('patient-selection-container').classList.remove('hidden');
            document.getElementById('header-patient-info').classList.add('hidden');
            // Re-run abnormal checks with no patient
            document.querySelectorAll('.p-result').forEach(input => checkAbnormal(input));
        }

        // Editor Logic
        function addReportSection() {
            const tpl = document.getElementById('report-sec-template');
            const clone = tpl.content.cloneNode(true);
            document.getElementById('report-sections-container').appendChild(clone);
            // Ensure save button reappears
            if (typeof toggleActionState === 'function') toggleActionState('editing');
            return document.getElementById('report-sections-container').lastElementChild;
        }

        function addParamLine(btn, paramData = null) {
            const tpl = document.getElementById('param-line-template');
            const clone = tpl.content.cloneNode(true);
            const line = clone.querySelector('.param-line');
            
            // If no data, initialize a default structure for manually added rows
            if (!paramData) {
                paramData = { 
                    name: '', 
                    result: '', 
                    units: '', 
                    isGenderSpecific: false, 
                    normalRange: { min: null, max: null } 
                };
            }

            line.querySelector('.p-name').value = paramData.name || '';
            line.querySelector('.p-result').value = paramData.result || '';
            line.querySelector('.p-units-input').value = paramData.units || '';
            
            // Set normal range input text
            const rangeInput = line.querySelector('.p-normal-input');
            if (paramData.isGenderSpecific) {
                const m = paramData.normalRange?.male;
                const f = paramData.normalRange?.female;
                rangeInput.value = `M: ${m?.min ?? '?'}-${m?.max ?? '?'} | F: ${f?.min ?? '?'}-${f?.max ?? '?'}`;
                rangeInput.readOnly = true; // Gender specific should generally come from templates
                rangeInput.classList.add('bg-slate-50', 'text-slate-400');
                rangeInput.classList.remove('bg-emerald-50/50', 'text-emerald-700');
            } else if (paramData.normalRange) {
                const nr = paramData.normalRange;
                rangeInput.value = (nr.min !== null && nr.max !== null) ? `${nr.min} - ${nr.max}` : '';
            }

            // Store structural data for initial tracking
            line.dataset.paramData = JSON.stringify(paramData);
            
            const container = btn.previousElementSibling;
            container.appendChild(clone);

            // Initial auto-bold if result exists
            if (paramData?.result) {
                checkAbnormal(line.querySelector('.p-result'));
            }
        }

        /**
         * Check if result is abnormal based on patient gender and structured ranges.
         */
        function checkAbnormal(inputEl) {
            const line = inputEl.closest('.param-line');
            if (!line) return;
            
            const resultStr = line.querySelector('.p-result').value.trim();
            const rangeStr = line.querySelector('.p-normal-input').value.trim();
            const resultMatch = resultStr.match(/([\d.]+)/);
            
            // Reset styles
            const resultInput = line.querySelector('.p-result');
            resultInput.classList.remove('font-extrabold', 'text-red-600', 'border-red-300', 'bg-red-50');
            resultInput.classList.add('text-brand-700');
            
            if (!resultMatch) return;
            const resultNum = parseFloat(resultMatch[1]);
            
            let min = null, max = null;

            // Priority 1: If it's a gender-specific template row, use the hidden paramData
            if (line.dataset.paramData) {
                const param = JSON.parse(line.dataset.paramData);
                if (param.isGenderSpecific && currentPatient) {
                    const gender = currentPatient.gender.toLowerCase();
                    if (gender === 'male' && param.normalRange.male) {
                        min = param.normalRange.male.min;
                        max = param.normalRange.male.max;
                    } else if (gender === 'female' && param.normalRange.female) {
                        min = param.normalRange.female.min;
                        max = param.normalRange.female.max;
                    }
                    if (min !== null && max !== null) {
                       if (resultNum < min || resultNum > max) {
                           resultInput.classList.add('font-extrabold', 'text-red-600', 'border-red-300', 'bg-red-50');
                       }
                       return;
                    }
                }
            }

            // Priority 2: Use the manual text input if possible (parse "12 - 14")
            const rangeMatch = rangeStr.match(/([\d.]+)\s*[-–—]\s*([\d.]+)/);
            if (rangeMatch) {
                min = parseFloat(rangeMatch[1]);
                max = parseFloat(rangeMatch[2]);
                if (resultNum < min || resultNum > max) {
                    resultInput.classList.add('font-extrabold', 'text-red-600', 'border-red-300', 'bg-red-50');
                }
            }
        }

        function toggleTemplate(checkbox, templateId) {
            if (checkbox.checked) {
                const t = templatesData.find(x => x._id === templateId);
                if (!t) return;
                
                // Optional: clean up completely empty default section
                const existingBlocks = document.querySelectorAll('.rep-section');
                if (existingBlocks.length === 1) {
                    const onlyBlock = existingBlocks[0];
                    const name = onlyBlock.querySelector('.rs-name').value;
                    const text = onlyBlock.querySelector('.rs-text').value;
                    const params = onlyBlock.querySelectorAll('.param-line').length;
                    if (!name && !text && params === 0) {
                        onlyBlock.remove();
                    }
                }

                t.sections.forEach(sec => {
                    const block = addReportSection();
                    block.dataset.templateId = templateId; // Mark it
                    block.querySelector('.rs-name').value = sec.sectionName;
                    block.querySelector('.rs-text').value = sec.defaultText || '';
                    
                    if (sec.parameters && Array.isArray(sec.parameters)) {
                        const btn = block.querySelector('button[onclick="addParamLine(this)"]');
                        sec.parameters.forEach(p => {
                            addParamLine(btn, p);
                        });
                    }
                });
            } else {
                // Unchecked, remove its sections
                const blocks = document.querySelectorAll(`.rep-section[data-template-id="${templateId}"]`);
                blocks.forEach(b => b.remove());
                
                // If container is totally empty now, add an empty section
                if (document.querySelectorAll('.rep-section').length === 0) {
                    addReportSection();
                }
            }
        }

        async function loadExistingReport(id) {
             try {
                 const res = await api.request(`/reports/${id}`);
                 const r = res.data;
                 
                 document.getElementById('page-title').textContent = 'Edit Diagnostic Report';
                 document.getElementById('report-id').value = r._id;
                 document.getElementById('report-status').value = r.status;
                 if (typeof updateStatusBadgeUI === 'function') updateStatusBadgeUI(r.status);
                 document.getElementById('report-referred-by').value = r.referredBy || '';
                 
                 if(r.patientId) selectPatient(r.patientId); // Handle case if patient was deleted
                 
                 const container = document.getElementById('report-sections-container');
                 container.innerHTML = '';

                  r.sections.forEach(sec => {
                      const block = addReportSection();
                      block.querySelector('.rs-name').value = sec.sectionName;
                      block.querySelector('.rs-text').value = sec.text || '';
                      
                      if (sec.parameters && Array.isArray(sec.parameters)) {
                          const btn = block.querySelector('button[onclick="addParamLine(this)"]');
                          sec.parameters.forEach(p => {
                              addParamLine(btn, p);
                          });
                      } else if (sec.values && typeof sec.values === 'object') {
                          // Backward compat
                          const btn = block.querySelector('button[onclick="addParamLine(this)"]');
                          for(const [k, v] of Object.entries(sec.values)) {
                              const p = { name: k };
                              if (typeof v === 'object' && v !== null) {
                                  p.result = v.value || '';
                                  // Simplified backward range
                                  const rangeMatch = (v.normalRange || '').match(/([\d.]+)\s*[-–—]\s*([\d.]+)/);
                                  p.units = (v.normalRange || '').replace(/[\d.\s-–—]+/g, '').trim();
                                  p.normalRange = {
                                      min: rangeMatch ? parseFloat(rangeMatch[1]) : null,
                                      max: rangeMatch ? parseFloat(rangeMatch[2]) : null
                                  };
                              } else {
                                  p.result = String(v);
                              }
                              addParamLine(btn, p);
                          }
                      }
                  });

                 // Show share actions if report exists
                 toggleActionState('saved');

             } catch(err) {
                 UI.showToast('Failed to load report', 'error');
             }
        }

        async function saveReport() {
            const patientId = document.getElementById('sp-id').value;
            if (!patientId) return UI.showToast('Please select a patient first', 'error');

            const referredBy = document.getElementById('report-referred-by').value.trim();
            if (!referredBy) return UI.showToast('Referring doctor/clinic is required', 'error');

            const status = 'draft';
            const reportId = document.getElementById('report-id').value;

            // Gather sections
            const sections = [];
            document.querySelectorAll('.rep-section').forEach(secBlock => {
                  const sName = secBlock.querySelector('.rs-name').value;
                  if(!sName) return;

                  const sText = secBlock.querySelector('.rs-text').value;
                  const parameters = [];
                  
                  secBlock.querySelectorAll('.param-line').forEach(pl => {
                       if (!pl.dataset.paramData) return;
                       const p = JSON.parse(pl.dataset.paramData);
                       p.name = pl.querySelector('.p-name').value;
                       p.result = pl.querySelector('.p-result').value;
                       p.units = pl.querySelector('.p-units-input').value;
                       
                       // Try to sync manual range edits back to structured data if NOT gender specific
                       if (!p.isGenderSpecific) {
                           const manualRangeStr = pl.querySelector('.p-normal-input').value;
                           const rMatch = manualRangeStr.match(/([\d.]+)\s*[-–—]\s*([\d.]+)/);
                           if (rMatch) {
                               p.normalRange = { 
                                   min: parseFloat(rMatch[1]) || null, 
                                   max: parseFloat(rMatch[2]) || null 
                               };
                           }
                       }

                       parameters.push(p);
                  });

                  sections.push({
                      sectionName: sName,
                      text: sText,
                      parameters: parameters.length > 0 ? parameters : undefined
                  });
            });

            if (sections.length === 0) return UI.showToast('Report must contain at least one section with a name', 'error');

            UI.toggleLoader('btn-save-report', true, '<i class="fas fa-circle-notch fa-spin mr-2"></i> Saving...');

            try {
                let savedReport;
                if(reportId) {
                    const res = await api.request(`/reports/${reportId}`, 'PUT', { status, sections, referredBy });
                    savedReport = res.data;
                    UI.showToast('Report updated successfully', 'success');
                } else {
                    const res = await api.request('/reports', 'POST', { patientId, status, sections, referredBy });
                    savedReport = res.data;
                    document.getElementById('report-id').value = savedReport._id;
                    document.getElementById('report-status').value = savedReport.status;
                    document.getElementById('page-title').textContent = 'Edit Diagnostic Report';
                    UI.showToast('Report saved as DRAFT', 'success');
                }

                document.getElementById('last-saved-info').textContent = `Document saved: ${new Date().toLocaleTimeString()}`;
                DraftManager.clear('report');

                // Switch to Share Mode
                toggleActionState('saved');

            } catch (err) {
                UI.showToast(err.message, 'error');
            } finally {
                UI.toggleLoader('btn-save-report', false, '<i class="fas fa-save mr-2"></i> Save Report Progress');
            }
        }

        /**
         * Logic to switch header between "Save" and "Share"
         */
        function toggleActionState(state) {
            const saveBtn = document.getElementById('btn-save-report');
            const shareActions = document.getElementById('header-post-save-actions');
            const statusBadge = document.getElementById('header-status-badge');
            const statusWrapper = document.getElementById('header-status-wrapper');
            const statusIcon = document.getElementById('header-status-icon');
            
            if (!saveBtn || !shareActions) return;

            if (state === 'saved') {
                saveBtn.classList.add('hidden');
                shareActions.classList.remove('hidden');
                shareActions.classList.add('flex');
                
                // Set badge appearance based on report-status input (if we have one set already)
                const currentStatus = document.getElementById('report-status').value || 'saved';
                updateStatusBadgeUI(currentStatus);
            } else {
                saveBtn.classList.remove('hidden');
                shareActions.classList.add('hidden');
                shareActions.classList.remove('flex');
            }
        }

        function updateStatusBadgeUI(status) {
            const badge = document.getElementById('header-status-badge');
            const wrapper = document.getElementById('header-status-wrapper');
            if (!badge || !wrapper) return;

            if (status.toLowerCase() === 'draft') {
                badge.textContent = 'Draft';
                wrapper.className = 'flex items-center bg-slate-100 text-slate-600 px-3 py-2 rounded-xl border border-slate-200 mr-2';
            } else {
                badge.textContent = 'Saved';
                wrapper.className = 'flex items-center bg-emerald-50 text-emerald-600 px-3 py-2 rounded-xl border border-emerald-100 mr-2';
            }
        }

        async function markReportAsSaved() {
            const id = document.getElementById('report-id').value;
            const currentStatus = document.getElementById('report-status').value;
            
            if (!id || currentStatus === 'saved') return;

            try {
                await api.request(`/reports/${id}`, 'PUT', { status: 'saved' });
                document.getElementById('report-status').value = 'saved';
                updateStatusBadgeUI('saved');
            } catch (err) {
                console.error('Failed to update status to saved', err);
            }
        }

        // Actions
        function downloadPdf() {
             const id = document.getElementById('report-id').value;
             const token = localStorage.getItem('lis_token');
             
             UI.showToast('Generating PDF securely...', 'success');
             
             fetch(`${BASE_URL}/reports/${id}/pdf`, {
                 headers: { 'Authorization': `Bearer ${token}` }
             })
             .then(res => {
                 if(!res.ok) throw new Error('Failed to generate PDF');
                 return res.blob();
             })
             .then(blob => {
                 const url = window.URL.createObjectURL(blob);
                 const a = document.createElement('a');
                 a.href = url;
                 a.download = `Diagnostic_Report_${id.slice(-6).toUpperCase()}.pdf`;
                 document.body.appendChild(a);
                 a.click();
                 a.remove();
                 
                 // Mark as saved upon successful interaction
                 markReportAsSaved();
             })
             .catch(err => {
                 UI.showToast(err.message, 'error');
             });
        }

        async function sendReport(method) {
            const id = document.getElementById('report-id').value;
            const btnId = `btn-${method}`;
            
            try {
                UI.toggleLoader(btnId, true, '<i class="fas fa-circle-notch fa-spin mr-2"></i> Processing...');
                const res = await api.request(`/reports/${id}/send`, 'POST', { method });
                UI.showToast(res.message, 'success');
                markReportAsSaved();
            } catch (err) {
                UI.showToast(err.message, 'error');
            } finally {
                UI.toggleLoader(btnId, false, method === 'whatsapp' ? '<i class="fab fa-whatsapp text-2xl mr-2"></i> Send to WhatsApp' : '<i class="fas fa-envelope text-xl mr-2"></i> Email to Patient');
            }
        }

        async function selectPatientById(id) {
            try {
                const res = await api.request(`/patients/${id}`);
                selectPatient(res.data);
                if (typeof saveReportDraft === 'function') saveReportDraft();
            } catch(e) {
                UI.showToast('Failed to load patient info', 'error');
            }
        }

        const saveReportDraft = DraftManager.debounce(() => {
            // Only save if in create mode
            if (document.getElementById('report-id').value) return;

            const sections = [];
            document.querySelectorAll('.rep-section').forEach(secBlock => {
                  const sName = secBlock.querySelector('.rs-name').value;
                  const sText = secBlock.querySelector('.rs-text').value;
                  const parameters = [];
                  secBlock.querySelectorAll('.param-line').forEach(pl => {
                       if (!pl.dataset.paramData) return;
                       const p = JSON.parse(pl.dataset.paramData);
                       p.name = pl.querySelector('.p-name').value;
                       p.result = pl.querySelector('.p-result').value;
                       p.units = pl.querySelector('.p-units-input').value;
                       parameters.push(p);
                  });
                  sections.push({ sectionName: sName, text: sText, parameters });
            });

            const templateIds = Array.from(document.querySelectorAll('#templates-checkbox-container input:checked')).map(cb => cb.value);

            const draft = {
                patient: currentPatient,
                referredBy: document.getElementById('report-referred-by').value,
                templateIds,
                sections,
                status: 'draft'
            };

            if (draft.patient || draft.referredBy || draft.sections.length > 0) {
                DraftManager.save('report', draft);
            }
        }, 800);
        // --- Add New Patient Modal Handling ---
        function openPatientModal() {
            document.getElementById('new-patient-form').reset();
            const modal = document.getElementById('new-patient-modal');
            const content = document.getElementById('new-patient-modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closePatientModal() {
            const modal = document.getElementById('new-patient-modal');
            const content = document.getElementById('new-patient-modal-content');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        async function saveNewPatient(e) {
            e.preventDefault();
            UI.toggleLoader('btn-save-new-patient', true, '<i class="fas fa-circle-notch fa-spin mr-2"></i> Saving...');

            const data = {
                name: document.getElementById('new-p-name').value,
                phone: document.getElementById('new-p-phone').value,
                age: document.getElementById('new-p-age').value,
                gender: document.getElementById('new-p-gender').value,
                address: document.getElementById('new-p-address').value
            };

            try {
                const res = await api.request(`/patients`, 'POST', data);
                UI.showToast('Patient added successfully', 'success');
                
                // Automatically select the new patient
                selectPatient(res.data);
                
                closePatientModal();
            } catch (err) {
                UI.showToast(err.message, 'error');
            } finally {
                UI.toggleLoader('btn-save-new-patient', false, 'Save Patient');
            }
        }
    </script>

    <!-- Add New Patient Modal -->
    <div id="new-patient-modal" class="fixed inset-0 bg-slate-900/40 hidden overflow-y-auto h-full w-full z-[1000] flex items-center justify-center transition-opacity">
        <div class="relative mx-auto border-0 w-full max-w-xl shadow-2xl rounded-2xl bg-white m-4 transform transition-transform scale-95 opacity-0 duration-300" id="new-patient-modal-content">
            
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <h3 class="text-xl font-bold text-slate-800 flex items-center">
                    <i class="fas fa-user-plus text-brand-500 mr-3"></i> Quick Add Patient
                </h3>
                <button onclick="closePatientModal()" class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 p-2 rounded-lg transition-colors focus:outline-none">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>

            <div class="px-8 py-6">
                <form id="new-patient-form" onsubmit="saveNewPatient(event)">
                    <div class="mb-5">
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Full Name <span class="text-red-500">*</span></label>
                        <input type="text" id="new-p-name" required placeholder="John Doe" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all font-medium text-slate-800">
                    </div>
                    
                    <div class="mb-5">
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Phone Number <span class="text-red-500">*</span></label>
                        <input type="text" id="new-p-phone" required placeholder="+1 234 567 8900" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all font-medium text-slate-800">
                    </div>

                    <div class="flex space-x-5 mb-5">
                        <div class="flex-1">
                            <label class="block text-sm font-bold text-slate-700 mb-1.5">Age <span class="text-red-500">*</span></label>
                            <input type="number" id="new-p-age" required min="0" placeholder="e.g. 35" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all font-medium text-slate-800">
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm font-bold text-slate-700 mb-1.5">Gender <span class="text-red-500">*</span></label>
                            <select id="new-p-gender" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all font-medium text-slate-800 cursor-pointer appearance-none">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-8">
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Address</label>
                        <textarea id="new-p-address" rows="3" placeholder="Full residential address..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all font-medium text-slate-800 resize-none"></textarea>
                    </div>

                    <div class="flex items-center justify-end space-x-4 pt-4 border-t border-slate-100">
                        <button type="button" onclick="closePatientModal()" class="px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50 hover:text-slate-800 focus:outline-none transition-colors">Cancel</button>
                        <button type="submit" id="btn-save-new-patient" class="px-6 py-2.5 rounded-xl shadow-md text-sm font-bold text-white bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 focus:outline-none transform hover:-translate-y-0.5 transition-all">Save Patient</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
