<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandatory Password Reset - MyPathoLabs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 antialiased text-slate-800">
    <div class="min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
        
        <!-- Simplified Background -->
        <div class="absolute inset-0 bg-red-500/5 -z-10"></div>

        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[2rem] shadow-xl border border-red-100/50 relative z-10 transition-shadow duration-300" id="card-container">
            
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-red-50 to-red-100 shadow-sm border border-red-200/50 mb-6 transition-all duration-300">
                    <i class="fas fa-lock text-4xl text-red-500"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Update Password</h2>
                <p class="text-sm text-slate-500 mb-2 max-w-xs mx-auto font-medium">To secure your account, you must update the temporary password provided to you.</p>
            </div>

            <form id="reset-form" class="mt-8 space-y-5" onsubmit="handleReset(event)">
                
                <div>
                    <label for="current-password" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Temporary Password</label>
                    <input id="current-password" type="password" required class="appearance-none block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium text-sm hover:border-slate-300" placeholder="Enter temp password">
                </div>

                <div class="border-t border-slate-100 my-4"></div>

                <div>
                    <label for="new-password" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">New Secure Password</label>
                    <input id="new-password" type="password" required minlength="8" class="appearance-none block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium text-sm hover:border-slate-300" placeholder="Min. 8 chars, 1 uppercase, 1 number">
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Confirm New Password</label>
                    <input id="confirm-password" type="password" required minlength="8" class="appearance-none block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500 transition-all font-medium text-sm hover:border-slate-300" placeholder="Re-type new password">
                </div>

                <button type="submit" id="btn-submit" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 shadow-lg shadow-red-500/30 transform hover:-translate-y-0.5 transition-all mt-8">
                    Secure Account & Continue
                    <i class="fas fa-shield-alt ml-2 group-hover:scale-110 transition-transform"></i>
                </button>
            </form>

        </div>
    </div>

    <!-- Centralized JS -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Only run minimum checkAuth (redirect to index if no token)
        const token = localStorage.getItem('lis_token');
        const user = localStorage.getItem('lis_user');
        if (!token || !user) {
            window.location.href = 'index.html';
        }

        async function handleReset(e) {
            e.preventDefault();
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                UI.showToast('New passwords do not match!', 'error');
                return;
            }

            if (currentPassword === newPassword) {
                UI.showToast('New password must be different from the temporary one.', 'error');
                return;
            }

            UI.toggleLoader('btn-submit', true);

            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });

                const data = await res.json();

                if (data.success) {
                    // Update user context manually
                    localStorage.setItem('lis_token', data.token);
                    localStorage.setItem('lis_user', JSON.stringify(data.user));

                    UI.showToast('Password updated! Redirecting to dashboard...');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    UI.showToast(data.error || 'Failed to update password', 'error');
                }
            } catch (err) {
                UI.showToast('Network error while resetting password', 'error');
            } finally {
                UI.toggleLoader('btn-submit', false, 'Secure Account & Continue <i class="fas fa-shield-alt ml-2 group-hover:scale-110 transition-transform"></i>');
            }
        }
    </script>
</body>
</html>
