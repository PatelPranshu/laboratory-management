<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MyPathoLabs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .ui-card { 
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem; 
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-brand-500 selection:text-white h-full overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        
        <main class="flex-1 flex flex-col relative overflow-hidden h-full">
            
            <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between z-40 shrink-0">
                <div class="flex-1 w-full max-w-2xl flex relative group">
                    <i class="fas fa-search absolute left-3.5 top-1/2 transform -translate-y-1/2 text-slate-400 group-focus-within:text-brand-500 transition-colors text-sm"></i>
                    <input type="text" id="global-search" placeholder="Search patients or reports..." class="w-full pl-10 pr-10 py-2 bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-brand-500 transition-all text-sm placeholder-slate-400 shadow-sm">
                    
                    <button id="search-filter-toggle" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-brand-600 p-1.5 rounded-md transition-colors" title="Advanced Filters">
                        <i class="fas fa-filter text-sm"></i>
                    </button>

                    <div id="date-filter-panel" class="absolute top-12 right-0 w-72 bg-white shadow-lg rounded-lg hidden overflow-hidden z-50 border border-slate-200 p-4">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="text-sm font-semibold text-slate-800">Search Filters</h4>
                            <button id="clear-filters" class="text-xs font-medium text-brand-600 hover:text-brand-800 transition-colors">Reset</button>
                        </div>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-600 mb-1">Created From</label>
                                <input type="date" id="filter-from-date" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-md focus:outline-none focus:border-brand-500 text-sm text-slate-700 shadow-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-600 mb-1">Created To</label>
                                <input type="date" id="filter-to-date" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-md focus:outline-none focus:border-brand-500 text-sm text-slate-700 shadow-sm">
                            </div>
                        </div>
                    </div>

                    <div id="search-results" class="absolute top-12 left-0 w-full bg-white shadow-lg rounded-lg hidden overflow-hidden z-40 border border-slate-200 max-h-96 overflow-y-auto custom-scrollbar"></div>
                </div>
                
                <div class="ml-6 flex items-center space-x-4 relative">
                    <button class="relative p-2 text-slate-400 hover:text-slate-600 transition-colors focus:outline-none" id="notification-bell">
                        <i class="fas fa-bell text-xl"></i>
                        <span class="absolute top-1.5 right-1.5 flex h-2 w-2">
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                        </span>
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto custom-scrollbar bg-slate-50/50">
                <div class="max-w-[1400px] mx-auto p-8">
                    
                    <div class="flex items-center justify-between mb-8">
                        <div>
                            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Dashboard Overview</h1>
                            <p class="text-sm text-slate-500 mt-0.5">Welcome back. Here's what's happening today.</p>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="text-right hidden xl:block">
                                <p class="text-sm font-medium text-slate-500" id="current-date"></p>
                            </div>
                            <a href="report-create.html" class="flex items-center px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg shadow-sm transition-all font-medium text-sm">
                                <i class="fas fa-plus mr-2 text-white/80"></i>
                                Create Report
                            </a>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="stats-container">
                        <div class="ui-card p-6 flex items-center justify-center h-28">
                            <i class="fas fa-circle-notch fa-spin text-2xl text-slate-400"></i>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="ui-card overflow-hidden flex flex-col">
                            <div class="px-6 py-4 border-b border-slate-200 bg-white flex justify-between items-center shrink-0">
                                <h2 class="text-base font-bold text-slate-800">Recent Patients</h2>
                                <a href="patients.html" class="text-sm font-medium text-brand-600 hover:text-brand-800 transition-colors flex items-center">View All <i class="fas fa-chevron-right ml-1 text-[10px]"></i></a>
                            </div>
                            <div class="p-0 overflow-x-auto">
                                <table class="min-w-full divide-y divide-slate-100">
                                    <thead class="bg-slate-50">
                                        <tr>
                                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Patient Name</th>
                                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Phone</th>
                                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Date Added</th>
                                        </tr>
                                    </thead>
                                    <tbody id="recent-patients-list" class="bg-white divide-y divide-slate-50">
                                        </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="ui-card overflow-hidden flex flex-col">
                             <div class="px-6 py-4 border-b border-slate-200 bg-white flex justify-between items-center shrink-0">
                                <h2 class="text-base font-bold text-slate-800">Recent Reports</h2>
                                <a href="pending-reports.html" class="text-sm font-medium text-brand-600 hover:text-brand-800 transition-colors flex items-center">View Pending <i class="fas fa-chevron-right ml-1 text-[10px]"></i></a>
                            </div>
                            <div class="p-0 overflow-x-auto">
                                <table class="min-w-full divide-y divide-slate-100">
                                    <thead class="bg-slate-50">
                                        <tr>
                                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Patient</th>
                                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                                            <th class="px-6 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="recent-reports-list" class="bg-white divide-y divide-slate-50">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCommonLayout();
            checkAuth();
            loadDashboardData();
            setupSearch();
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', options);
        });

        async function loadDashboardData() {
            try {
                const res = await api.request('/dashboard/summary');
                const data = res.data;

                // Redesigned KPI Cards mapping to new UI style
                const statsHTML = `
                    <div class="ui-card p-5 flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-brand-50 text-brand-600 flex items-center justify-center text-xl shrink-0"><i class="fas fa-users"></i></div>
                        <div>
                            <p class="text-sm font-medium text-slate-500">Total Patients</p>
                            <h3 class="text-2xl font-bold text-slate-900 leading-tight">${data.totalPatients}</h3>
                        </div>
                    </div>

                    <div class="ui-card p-5 flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center text-xl shrink-0"><i class="fas fa-clock"></i></div>
                        <div>
                            <p class="text-sm font-medium text-slate-500">Pending Reports</p>
                            <h3 class="text-2xl font-bold text-slate-900 leading-tight">${data.pendingReports}</h3>
                        </div>
                    </div>

                    <div class="ui-card p-5 flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center text-xl shrink-0"><i class="fas fa-check-circle"></i></div>
                        <div>
                            <p class="text-sm font-medium text-slate-500">Sent Reports</p>
                            <h3 class="text-2xl font-bold text-slate-900 leading-tight">${data.sentReports}</h3>
                        </div>
                    </div>

                    <div class="ui-card p-5 flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl shrink-0"><i class="fas fa-file-alt"></i></div>
                        <div>
                            <p class="text-sm font-medium text-slate-500">Total Reports</p>
                            <h3 class="text-2xl font-bold text-slate-900 leading-tight">${data.totalReports}</h3>
                        </div>
                    </div>
                `;
                document.getElementById('stats-container').innerHTML = statsHTML;

                // Render Recent Patients
                const patientsList = document.getElementById('recent-patients-list');
                patientsList.innerHTML = data.recentPatients.map(p => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-3 whitespace-nowrap">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-brand-50 text-brand-600 flex items-center justify-center font-medium text-sm shrink-0">
                                    ${p.name.charAt(0)}
                                </div>
                                <div class="text-sm font-medium text-slate-800">${p.name}</div>
                            </div>
                        </td>
                        <td class="px-6 py-3 whitespace-nowrap text-sm text-slate-500">${p.phone}</td>
                        <td class="px-6 py-3 whitespace-nowrap text-sm text-slate-500">${new Date(p.createdAt).toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'})}</td>
                    </tr>
                `).join('') || `<tr><td colspan="3" class="px-6 py-8 text-center text-sm text-slate-500">No recent patients.</td></tr>`;

                // Render Recent Reports
                const reportsList = document.getElementById('recent-reports-list');
                reportsList.innerHTML = data.recentReports.map(r => {
                    const statusBadge = r.status === 'sent' ? `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200">SENT</span>` : 
                                        r.status === 'saved' ? `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-50 text-blue-700 border border-blue-200">SAVED</span>` :
                                        `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-700 border border-slate-200">DRAFT</span>`;
                    return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-3 whitespace-nowrap text-sm font-medium text-slate-800">${r.patientId ? r.patientId.name : 'Unknown Patient'}</td>
                        <td class="px-6 py-3 whitespace-nowrap">${statusBadge}</td>
                        <td class="px-6 py-3 whitespace-nowrap text-right text-sm">
                            ${r.status !== 'draft' ? `<a href="${BASE_URL}/reports/${r._id}/pdf?token=${localStorage.getItem('lis_token')}" target="_blank" class="p-1.5 text-slate-400 hover:text-brand-600 transition-colors mr-1" title="View PDF"><i class="fas fa-file-pdf"></i></a>` : ''}
                            <a href="report-create.html?edit=${r._id}" class="p-1.5 text-slate-400 hover:text-brand-600 transition-colors" title="Edit Report"><i class="fas fa-edit"></i></a>
                        </td>
                    </tr>
                `}).join('') || `<tr><td colspan="3" class="px-6 py-8 text-center text-sm text-slate-500">No recent reports found.</td></tr>`;

            } catch (err) {
                UI.showToast('Failed to load dashboard data', 'error');
            }
        }

        // Global Search Logic 
        function setupSearch() {
            const searchInput = document.getElementById('global-search');
            const resultsBox = document.getElementById('search-results');
            const filterToggle = document.getElementById('search-filter-toggle');
            const filterPanel = document.getElementById('date-filter-panel');
            const fromDateInput = document.getElementById('filter-from-date');
            const toDateInput = document.getElementById('filter-to-date');
            const clearBtn = document.getElementById('clear-filters');
            
            let debounceTimer;
            let abortController = null;

            const triggerSearch = () => {
                clearTimeout(debounceTimer);
                const query = searchInput.value.trim();
                const fromDate = fromDateInput.value;
                const toDate = toDateInput.value;
                
                if (query.length < 2 && !fromDate && !toDate) {
                    resultsBox.classList.add('hidden');
                    return;
                }

                resultsBox.innerHTML = `
                    <div class="px-4 py-6 text-center text-slate-400">
                        <i class="fas fa-circle-notch fa-spin text-xl mb-2"></i>
                        <p class="text-sm font-medium">Searching...</p>
                    </div>
                `;
                resultsBox.classList.remove('hidden');

                debounceTimer = setTimeout(async () => {
                    if (abortController) abortController.abort();
                    abortController = new AbortController();

                    try {
                        const url = `/search?query=${encodeURIComponent(query)}&fromDate=${fromDate}&toDate=${toDate}`;
                        const res = await api.request(url, 'GET', null, abortController.signal);
                        
                        let html = '';
                        if (res.data.patients.length > 0) {
                            html += '<div class="bg-slate-50 px-4 py-2 text-xs font-semibold text-slate-500 border-b border-slate-100 uppercase tracking-wider">Patients</div>';
                            res.data.patients.forEach(p => {
                                html += `
                                <a href="patients.html?id=${p._id}" class="block px-4 py-3 hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0 group">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full bg-brand-50 text-brand-600 flex items-center justify-center font-medium text-sm shrink-0">${p.name.charAt(0)}</div>
                                        <div>
                                            <span class="font-medium text-sm text-slate-800 group-hover:text-brand-700 transition-colors block leading-none">${p.name}</span>
                                            <span class="text-slate-500 text-xs mt-1 block">${p.phone}</span>
                                        </div>
                                    </div>
                                </a>`;
                            });
                        }
                        
                        if (res.data.reports.length > 0) {
                            html += '<div class="bg-slate-50 px-4 py-2 text-xs font-semibold text-slate-500 border-y border-slate-100 uppercase tracking-wider">Reports</div>';
                             res.data.reports.forEach(r => {
                                const statusColor = r.status === 'sent' ? 'text-emerald-500' : 'text-amber-500';
                                html += `
                                <a href="report-create.html?edit=${r._id}" class="block px-4 py-3 hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0 group">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center text-sm shrink-0"><i class="fas fa-file-medical-alt"></i></div>
                                        <div>
                                            <span class="font-medium text-sm text-slate-800 group-hover:text-brand-700 transition-colors block leading-none">Report for ${r.patientId ? r.patientId.name : 'Unknown'}</span>
                                            <span class="text-slate-500 text-xs mt-1 block">${new Date(r.date).toLocaleDateString()} • <span class="${statusColor} font-medium">${r.status.toUpperCase()}</span></span>
                                        </div>
                                    </div>
                                </a>`;
                            });
                        }

                        if (!html) {
                            html = `
                            <div class="px-4 py-8 text-center bg-white">
                                <i class="fas fa-search text-2xl text-slate-300 mb-2"></i>
                                <p class="text-sm font-medium text-slate-600">No results found</p>
                            </div>`;
                        }
                        
                        resultsBox.innerHTML = html;
                        resultsBox.classList.remove('hidden');

                    } catch (err) {
                        if (err.name === 'AbortError') return; 
                        resultsBox.classList.add('hidden');
                    }
                }, 400); 
            };

            searchInput.addEventListener('input', triggerSearch);
            fromDateInput.addEventListener('change', triggerSearch);
            toDateInput.addEventListener('change', triggerSearch);

            filterToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                filterPanel.classList.toggle('hidden');
                filterToggle.classList.toggle('text-brand-600');
                filterToggle.classList.toggle('bg-brand-50');
            });

            clearBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fromDateInput.value = '';
                toDateInput.value = '';
                triggerSearch();
            });

            document.addEventListener('click', (e) => {
                if (!filterPanel.contains(e.target) && !filterToggle.contains(e.target)) {
                    filterPanel.classList.add('hidden');
                    filterToggle.classList.remove('text-brand-600', 'bg-brand-50');
                }
                if (!searchInput.contains(e.target) && !resultsBox.contains(e.target)) {
                    resultsBox.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
