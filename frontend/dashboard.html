<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MyPathoLabs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 antialiased text-slate-800 selection:bg-brand-500 selection:text-white">

    <div class="flex h-screen overflow-hidden bg-slate-100">
        
        <!-- Sidebar is now injected by layout.js -->
        <!-- Main Content -->
        <main class="flex-1 relative overflow-y-auto focus:outline-none custom-scrollbar pb-12">
            
            <!-- Top Header (Search) -->
            <header class="bg-white border-b border-slate-200 flex items-center justify-between px-8 py-5 sticky top-0 z-10">
                <div class="flex-1 w-full max-w-2xl flex relative group">
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 group-focus-within:text-brand-500 transition-colors"></i>
                    <input type="text" id="global-search" placeholder="Search patients or reports..." class="w-full pl-12 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 shadow-sm transition-all text-sm font-medium">
                    
                    <!-- Filter Toggle Button -->
                    <button id="search-filter-toggle" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-brand-600 p-2 rounded-lg transition-colors" title="Advanced Filters">
                        <i class="fas fa-filter text-xs"></i>
                    </button>

                    <!-- Date Filter Panel (Popover) -->
                    <div id="date-filter-panel" class="absolute top-14 right-0 w-80 bg-white shadow-xl rounded-2xl hidden overflow-hidden z-30 border border-slate-100 p-5 animate-fade-in">
                        <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-50">
                            <h4 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Search Filters</h4>
                            <button id="clear-filters" class="text-[10px] font-bold text-brand-600 hover:text-brand-800 uppercase tracking-widest transition-colors">Reset</button>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Created From</label>
                                <input type="date" id="filter-from-date" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-xs font-semibold text-slate-700">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Created To</label>
                                <input type="date" id="filter-to-date" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-xs font-semibold text-slate-700">
                            </div>
                        </div>
                    </div>

                    <div id="search-results" class="absolute top-14 left-0 w-full bg-white shadow-lg rounded-xl hidden overflow-hidden z-20 border border-slate-100"></div>
                </div>
                <div class="ml-6 flex items-center space-x-4" id="header-actions">
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="px-8 py-8 max-w-[1600px] mx-auto">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Dashboard Overview</h1>
                        <p class="text-sm text-slate-500 mt-1">Welcome back. Here's what's happening today.</p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="text-right hidden xl:block">
                            <p class="text-sm font-medium text-slate-500" id="current-date"></p>
                        </div>
                        <a href="report-create.html" class="flex items-center px-5 py-3 bg-brand-600 hover:bg-brand-700 text-white rounded-xl shadow-lg shadow-brand-500/20 transition-all font-bold text-sm active:scale-95 group">
                            <i class="fas fa-plus-circle mr-2 text-brand-200 group-hover:text-white transition-colors"></i>
                            Create New Report
                        </a>
                    </div>
                </div>

                <!-- KPI Cards -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="stats-container">
                    <div class="glass-card p-8 flex items-center justify-center h-36">
                        <i class="fas fa-circle-notch fa-spin text-3xl text-brand-500"></i>
                    </div>
                </div>



                <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                    <!-- Recent Patients -->
                    <div class="glass-card overflow-hidden">
                        <div class="px-7 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                            <h2 class="text-lg font-bold text-slate-800 flex items-center"><i class="fas fa-user-plus text-brand-500 mr-2"></i> Recent Additions</h2>
                            <a href="patients.html" class="text-sm font-semibold text-brand-600 hover:text-brand-800 hover:underline transition-colors block">View All <i class="fas fa-arrow-right ml-1 text-xs"></i></a>
                        </div>
                        <div class="p-0 overflow-x-auto">
                            <table class="min-w-full divide-y divide-slate-100">
                                <thead class="bg-slate-50/50">
                                    <tr>
                                        <th class="px-7 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Patient</th>
                                        <th class="px-7 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Phone</th>
                                        <th class="px-7 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Date Added</th>
                                    </tr>
                                </thead>
                                <tbody id="recent-patients-list" class="divide-y divide-slate-200">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Pending Reports -->
                    <div class="glass-card overflow-hidden">
                         <div class="px-7 py-5 border-b border-slate-100/50 flex justify-between items-center bg-white/40">
                            <h2 class="text-lg font-bold text-slate-800 flex items-center"><i class="fas fa-flask text-brand-500 mr-2"></i> Recent Reports</h2>
                        </div>
                        <div class="p-0 overflow-x-auto">
                            <table class="min-w-full divide-y divide-slate-100">
                                <thead class="bg-slate-50/50">
                                    <tr>
                                        <th class="px-7 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Patient</th>
                                        <th class="px-7 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                                        <th class="px-7 py-4 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="recent-reports-list" class="divide-y divide-slate-100">
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="js/layout.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCommonLayout();
            checkAuth();
            loadDashboardData();
            setupSearch();
            
            // Set current date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', options);

            // Auto-refresh dashboard when user switches back to this tab (10s throttle)
            if (typeof TabFocusRefresh !== 'undefined') {
                TabFocusRefresh.register(loadDashboardData);
            }
        });

        async function loadDashboardData() {
            try {
                const res = await api.request('/dashboard/summary');
                const data = res.data;

                // Render KPI
                const statsHTML = `
                    <div class="glass-card relative overflow-hidden group">
                        <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-brand-500 opacity-5 rounded-full"></div>
                        <div class="p-6">
                            <div class="flex items-center justify-between mb-4">
                                <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Total Patients</p>
                                <div class="p-2.5 rounded-xl bg-brand-50 text-brand-600 shadow-sm border border-brand-100/50">
                                    <i class="fas fa-users"></i>
                                </div>
                            </div>
                            <h3 class="text-3xl font-bold text-slate-800 tracking-tight">${data.totalPatients}</h3>
                        </div>
                    </div>

                    <div class="glass-card relative overflow-hidden group">
                        <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-orange-500 opacity-5 rounded-full"></div>
                        <div class="p-6">
                            <div class="flex items-center justify-between mb-4">
                                <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Pending Reports</p>
                                <div class="p-2.5 rounded-xl bg-orange-50 text-orange-600 shadow-sm border border-orange-100/50">
                                    <i class="fas fa-clock"></i>
                                </div>
                            </div>
                            <h3 class="text-3xl font-bold text-slate-800 tracking-tight">${data.pendingReports}</h3>
                        </div>
                    </div>

                    <div class="glass-card relative overflow-hidden group">
                        <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-emerald-500 opacity-5 rounded-full"></div>
                        <div class="p-6">
                            <div class="flex items-center justify-between mb-4">
                                <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Sent Reports</p>
                                <div class="p-2.5 rounded-xl bg-emerald-50 text-emerald-600 shadow-sm border border-emerald-100/50">
                                    <i class="fas fa-check-circle"></i>
                                </div>
                            </div>
                            <h3 class="text-3xl font-bold text-slate-800 tracking-tight">${data.sentReports}</h3>
                        </div>
                    </div>

                    <div class="glass-card relative overflow-hidden group">
                        <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-indigo-500 opacity-5 rounded-full"></div>
                        <div class="p-6">
                            <div class="flex items-center justify-between mb-4">
                                <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Total Reports</p>
                                <div class="p-2.5 rounded-xl bg-indigo-50 text-indigo-600 shadow-sm border border-indigo-100/50">
                                    <i class="fas fa-file-alt"></i>
                                </div>
                            </div>
                            <h3 class="text-3xl font-bold text-slate-800 tracking-tight">${data.totalReports}</h3>
                        </div>
                    </div>
                `;
                document.getElementById('stats-container').innerHTML = statsHTML;

                // Render Recent Patients
                const patientsList = document.getElementById('recent-patients-list');
                patientsList.innerHTML = data.recentPatients.map(p => `
                    <tr class="hover:bg-brand-50/30 transition-colors cursor-pointer" onclick="window.location.href='patient-profile.html?id=${p._id}'">
                        <td class="px-7 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 h-10 w-10 rounded-xl bg-gradient-to-br from-brand-100 to-indigo-100 text-brand-700 flex items-center justify-center font-bold shadow-sm border border-white">
                                    ${sanitizeHTML(p.name.charAt(0))}
                                </div>
                                <div class="ml-4">
                                    <div class="text-sm font-bold text-slate-800">${sanitizeHTML(p.name)}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-7 py-4 whitespace-nowrap text-sm text-slate-500 font-medium">${sanitizeHTML(p.phone)}</td>
                        <td class="px-7 py-4 whitespace-nowrap text-sm text-slate-500">${new Date(p.createdAt).toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'})}</td>
                    </tr>
                `).join('') || `<tr><td colspan="3" class="px-7 py-8 text-center text-sm text-slate-500">No recent patients. Get started by adding one.</td></tr>`;

                // Render Recent Reports
                const reportsList = document.getElementById('recent-reports-list');
                reportsList.innerHTML = data.recentReports.map(r => {
                    const statusColors = {
                        draft: 'bg-slate-100 text-slate-600 border-slate-200',
                        saved: 'bg-brand-50 text-brand-700 border-brand-200',
                        sent: 'bg-emerald-50 text-emerald-700 border-emerald-200'
                    };
                    return `
                    <tr class="hover:bg-brand-50/30 transition-colors">
                        <td class="px-7 py-4 whitespace-nowrap text-sm font-bold text-slate-800">
                            ${r.patientId ? `<a href="patient-profile.html?id=${r.patientId._id}" class="hover:text-brand-600 transition-colors">${sanitizeHTML(r.patientId.name)}</a>` : 'Unknown Patient'}
                        </td>
                        <td class="px-7 py-4 whitespace-nowrap">
                            <span class="px-3 py-1 inline-flex text-xs font-bold rounded-lg border ${statusColors[r.status] || statusColors.draft} shadow-sm">${sanitizeHTML(r.status.toUpperCase())}</span>
                        </td>
                        <td class="px-7 py-4 whitespace-nowrap text-right text-sm font-medium">
                            ${r.status !== 'draft' ? `<a href="${BASE_URL}/reports/${r._id}/pdf?token=${localStorage.getItem('lis_token')}" target="_blank" class="p-2 text-brand-600 hover:bg-brand-50 hover:text-brand-800 rounded-lg transition-colors mr-1 tooltip-container" title="View PDF"><i class="fas fa-file-pdf"></i></a>` : ''}
                            <a href="report-create.html?edit=${r._id}" class="p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800 rounded-lg transition-colors tooltip-container" title="Edit Report"><i class="fas fa-edit"></i></a>
                        </td>
                    </tr>
                `}).join('') || `<tr><td colspan="3" class="px-7 py-8 text-center text-sm text-slate-500">No recent reports found.</td></tr>`;



            } catch (err) {
                UI.showToast('Failed to load dashboard data', 'error');
            }
        }

        // Global Search Logic (Maintained exactly)
        function setupSearch() {
            const searchInput = document.getElementById('global-search');
            const resultsBox = document.getElementById('search-results');
            const filterToggle = document.getElementById('search-filter-toggle');
            const filterPanel = document.getElementById('date-filter-panel');
            const fromDateInput = document.getElementById('filter-from-date');
            const toDateInput = document.getElementById('filter-to-date');
            const clearBtn = document.getElementById('clear-filters');
            
            let debounceTimer;
            let abortController = null;

            const triggerSearch = () => {
                clearTimeout(debounceTimer);
                const query = searchInput.value.trim();
                const fromDate = fromDateInput.value;
                const toDate = toDateInput.value;
                
                // Only search if length >= 2 OR dates are provided
                if (query.length < 2 && !fromDate && !toDate) {
                    resultsBox.classList.add('hidden');
                    return;
                }

                // Show localized loading spinner
                resultsBox.innerHTML = `
                    <div class="px-5 py-8 text-center bg-white">
                        <i class="fas fa-circle-notch fa-spin text-2xl text-brand-500 mb-2"></i>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Scanning Database...</p>
                    </div>
                `;
                resultsBox.classList.remove('hidden');

                debounceTimer = setTimeout(async () => {
                    // Cancel any previous pending request
                    if (abortController) abortController.abort();
                    abortController = new AbortController();

                    try {
                        const url = `/search?query=${encodeURIComponent(query)}&fromDate=${fromDate}&toDate=${toDate}`;
                        const res = await api.request(url, 'GET', null, abortController.signal);
                        
                        let html = '';
                        if (res.data.patients.length > 0) {
                            html += '<div class="bg-slate-50/80 px-5 py-2.5 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100">Patients</div>';
                            res.data.patients.forEach(p => {
                                html += `
                                <a href="patients.html?id=${p._id}" class="block px-5 py-3 hover:bg-brand-50 transition-colors text-sm border-b border-slate-50 last:border-0 group">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-lg bg-brand-100 text-brand-700 flex items-center justify-center font-bold text-xs mr-3 border border-brand-200 shadow-sm">${p.name.charAt(0)}</div>
                                        <div>
                                            <span class="font-bold text-slate-800 group-hover:text-brand-700 transition-colors">${p.name}</span>
                                            <span class="text-slate-400 block text-[10px] mt-0.5 font-medium"><i class="fas fa-phone-alt mr-1 text-[9px]"></i> ${p.phone}</span>
                                        </div>
                                    </div>
                                </a>`;
                            });
                        }
                        
                        if (res.data.reports.length > 0) {
                            html += '<div class="bg-slate-50/80 px-5 py-2.5 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-t border-slate-100">Reports</div>';
                             res.data.reports.forEach(r => {
                                const statusColor = r.status === 'sent' ? 'text-emerald-500' : 'text-amber-500';
                                html += `
                                <a href="report-create.html?edit=${r._id}" class="block px-5 py-3 hover:bg-brand-50 transition-colors text-sm border-b border-slate-50 last:border-0 group">
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-lg bg-slate-100 text-slate-600 flex items-center justify-center font-bold text-xs mr-3 border border-slate-200 shadow-sm"><i class="fas fa-file-medical-alt text-[10px]"></i></div>
                                        <div>
                                            <span class="font-bold text-slate-800 group-hover:text-brand-700 transition-colors">Report for ${r.patientId ? r.patientId.name : 'Unknown'}</span>
                                            <span class="text-slate-400 block text-[10px] mt-0.5 font-medium italic"><i class="fas fa-calendar-alt mr-1 text-[9px]"></i> ${new Date(r.date).toLocaleDateString()} &bull; <i class="fas fa-circle mr-1 text-[8px] ${statusColor}"></i> ${r.status.toUpperCase()}</span>
                                        </div>
                                    </div>
                                </a>`;
                            });
                        }

                        if (!html) {
                            html = `
                            <div class="px-5 py-10 text-center animate-fade-in bg-white/80">
                                <div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3 border border-slate-100 text-slate-300">
                                    <i class="fas fa-search text-xl"></i>
                                </div>
                                <p class="text-sm font-bold text-slate-500">No results found</p>
                                <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-wider font-medium">Try adjusting your filters or date range</p>
                            </div>`;
                        }
                        
                        resultsBox.innerHTML = html;
                        resultsBox.classList.remove('hidden');

                    } catch (err) {
                        if (err.name === 'AbortError') return; 
                        console.error('Search failed', err);
                        resultsBox.classList.add('hidden');
                    }
                }, 400); 
            };

            // Event Listeners
            searchInput.addEventListener('input', triggerSearch);
            fromDateInput.addEventListener('change', triggerSearch);
            toDateInput.addEventListener('change', triggerSearch);

            filterToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                filterPanel.classList.toggle('hidden');
                filterToggle.classList.toggle('text-brand-600');
                filterToggle.classList.toggle('bg-brand-50');
            });

            clearBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                fromDateInput.value = '';
                toDateInput.value = '';
                triggerSearch();
            });

            // Close dropdowns on outside click
            document.addEventListener('click', (e) => {
                if (!filterPanel.contains(e.target) && !filterToggle.contains(e.target)) {
                    filterPanel.classList.add('hidden');
                    filterToggle.classList.remove('text-brand-600', 'bg-brand-50');
                }
                if (!searchInput.contains(e.target) && !resultsBox.contains(e.target)) {
                    resultsBox.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
