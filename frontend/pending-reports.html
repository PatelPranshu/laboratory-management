<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Reports - MyPathoLabs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased selection:bg-brand-200 selection:text-brand-900">
    
    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

    <div class="flex h-screen overflow-hidden bg-slate-100">
        <!-- Sidebar Layout Injected via JS -->
        
        <main class="flex-1 relative overflow-y-auto focus:outline-none custom-scrollbar pb-12">
            <!-- Header -->
            <header class="bg-white border-b border-slate-200 flex items-center justify-between px-8 py-5 sticky top-0 z-10">
                <div class="flex-1 w-full max-w-2xl flex relative opacity-0"></div>
                <!-- Breadcrumbs -->
                <nav class="flex absolute left-8 top-1/2 transform -translate-y-1/2" aria-label="Breadcrumb">
                  <ol class="inline-flex items-center space-x-1 md:space-x-3 text-sm font-medium">
                    <li class="inline-flex items-center text-slate-500 hover:text-brand-600 transition-colors">
                      <a href="dashboard.html" class="inline-flex items-center"><i class="fas fa-home mr-2"></i>Dashboard</a>
                    </li>
                    <li>
                      <div class="flex items-center">
                        <i class="fas fa-chevron-right text-slate-400 text-xs mx-2"></i>
                        <span class="text-slate-800 font-bold">Pending Reports</span>
                      </div>
                    </li>
                  </ol>
                </nav>
            </header>

            <div class="px-8 py-8 max-w-[1600px] mx-auto">
                <div class="mb-8">
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center mt-2 group">
                        <i class="fas fa-clock text-brand-500 mr-3 group-hover:scale-110 transition-transform"></i>
                        Pending Verification
                    </h1>
                    <p class="text-slate-500 mt-2 text-sm max-w-xl leading-relaxed">Review draft reports awaiting signature or final approval.</p>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
                    <div class="overflow-x-auto min-h-[400px]">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-slate-500 bg-slate-50/80 uppercase font-bold tracking-wider">
                                <tr>
                                    <th scope="col" class="px-6 py-4">Draft Date</th>
                                    <th scope="col" class="px-6 py-4">Patient</th>
                                    <th scope="col" class="px-6 py-4">Prepared By</th>
                                    <th scope="col" class="px-6 py-4">Assigned Doctor</th>
                                    <th scope="col" class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="pending-table-body" class="divide-y divide-slate-100">
                                <tr><td colspan="5" class="px-6 py-8 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i>Loading drafts...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Centralized JS -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/pending-reports.js"></script>
</body>
</html>
