<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Templates - MyPathoLabs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .ui-card { 
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem; 
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
        }

        /* Prevent number input arrows in modern browsers for cleaner UI */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-brand-500 selection:text-white h-full overflow-hidden">

    <div id="toast-container" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3"></div>

    <div class="flex h-screen overflow-hidden">
        
        <main class="flex-1 flex flex-col relative overflow-hidden h-full">
            
            <header class="bg-white border-b border-slate-200 px-4 sm:px-8 py-3 sm:py-4 flex items-center justify-between z-50 shrink-0">
                <div class="flex items-center gap-4">
                    <div>
                        <nav class="hidden sm:flex text-xs font-medium text-slate-500 mb-1">
                            <ol class="flex items-center space-x-2">
                                <li class="hover:text-brand-600 transition-colors"><a href="dashboard.html">Dashboard</a></li>
                                <li><i class="fas fa-chevron-right text-[10px] opacity-50"></i></li>
                                <li class="text-slate-700 font-semibold">Report Templates</li>
                            </ol>
                        </nav>
                        <h1 class="text-lg sm:text-xl font-bold text-slate-900 tracking-tight" id="page-title">Manage Templates</h1>
                    </div>
                </div>

                <div class="flex items-center gap-2 sm:gap-4 ml-auto" id="header-actions">
                    <button onclick="createNewTemplate()" class="p-2 sm:px-5 sm:py-2.5 bg-white border border-slate-300 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 transition-all shadow-sm flex items-center" title="New Template">
                        <i class="fas fa-plus text-brand-600 sm:mr-2"></i> <span class="hidden sm:inline">New Template</span>
                    </button>
                    <div class="h-6 w-px bg-slate-200 mx-1 hidden sm:block"></div>
                    <button type="button" class="text-slate-400 hover:text-slate-700 transition-colors p-1" title="Close" onclick="window.location.href='dashboard.html'"><i class="fas fa-times text-xl"></i></button>
                </div>
            </header>

            <div class="flex-1 bg-slate-50/50 p-4 sm:p-6 overflow-hidden flex flex-col">
                <div class="max-w-[1400px] w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1 min-h-0">
                    
                    <div class="lg:col-span-4 xl:col-span-3 flex flex-col h-full min-h-0">
                        <div class="ui-card flex flex-col h-full overflow-hidden">
                            <div class="px-5 py-4 border-b border-slate-100 bg-white rounded-t-xl flex justify-between items-center shrink-0">
                                <h2 class="text-sm font-bold text-slate-800"><i class="fas fa-list-ul text-brand-500 mr-2"></i>Saved Inventory</h2>
                                <button onclick="loadTemplates()" class="text-slate-400 hover:text-brand-600 transition-colors"><i class="fas fa-sync-alt text-xs"></i></button>
                            </div>
                            <ul id="templates-list" class="overflow-y-auto flex-1 custom-scrollbar divide-y divide-slate-50 bg-white">
                                <li class="p-6 text-center text-slate-400 flex flex-col items-center justify-center">
                                    <i class="fas fa-circle-notch fa-spin text-2xl mb-2"></i>
                                    <span class="font-medium text-sm">Loading templates...</span>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div class="lg:col-span-8 xl:col-span-9 flex flex-col h-full min-h-0">
                        <div class="ui-card flex flex-col h-full overflow-hidden relative">
                            <div class="px-4 sm:px-6 py-4 border-b border-slate-200 bg-white flex flex-col sm:flex-row justify-between sm:items-center gap-4 rounded-t-xl shrink-0 z-10 shadow-[0_4px_6px_-1px_rgb(0,0,0,0.02)]">
                                <div>
                                    <h2 class="text-lg font-bold text-slate-800" id="editor-title">Create New Template</h2>
                                    <p class="text-[11px] sm:text-sm text-slate-500 mt-0.5" id="editor-subtitle">Define sections and default parameters.</p>
                                </div>
                                <button id="btn-save-template" onclick="saveTemplate()" class="w-full sm:w-auto justify-center px-6 py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-bold text-sm rounded-lg shadow-sm transition-all flex items-center">
                                    <i class="fas fa-save mr-2"></i> Save Template
                                </button>
                            </div>
                            
                            <div class="flex-1 overflow-y-auto custom-scrollbar bg-slate-50/30 p-4 sm:p-6 flex flex-col">
                                <input type="hidden" id="template-id">
                                
                                <div class="mb-6 shrink-0 bg-white p-4 sm:p-5 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden">
                                     <div class="absolute top-0 left-0 w-1 h-full bg-brand-500"></div>
                                     <label class="block text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-2">Template Master Name <span class="text-red-500">*</span></label>
                                     <input type="text" id="t-name" placeholder="e.g. Comprehensive Metabolic Panel" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 focus:bg-white transition-all text-base sm:text-xl font-bold text-slate-800 placeholder-slate-400 ml-2 max-w-[calc(100%-0.5rem)]">
                                </div>

                                <div class="flex justify-between items-center mb-4 mt-2 shrink-0">
                                    <h3 class="text-sm font-bold text-slate-700 flex items-center">
                                        <i class="fas fa-layer-group text-slate-400 mr-2"></i> Document Sections
                                    </h3>
                                    <button onclick="addSection()" class="text-xs font-bold uppercase tracking-wider text-brand-600 hover:text-brand-800 hover:bg-brand-50 transition-colors flex items-center bg-white border border-slate-200 px-3 py-2 rounded-lg shadow-sm">
                                        <i class="fas fa-plus mr-1.5"></i> Add Section
                                    </button>
                                </div>

                                <div id="sections-container" class="space-y-6 flex-1 pb-4">
                                    <!-- Sections injected here -->
                                </div>
                                <div class="mt-4 pb-4">
                                    <button onclick="addSection()" class="w-full text-xs font-bold uppercase tracking-wider text-slate-500 hover:text-brand-600 hover:bg-white hover:border-brand-300 transition-colors flex items-center justify-center bg-transparent border-2 border-dashed border-slate-300 px-3 py-3 rounded-xl">
                                        <i class="fas fa-plus mr-2"></i> Add Another Section
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <template id="section-template">
        <div class="section-block bg-white border border-slate-200 rounded-lg shadow-sm relative transition-all group mb-4">
            
            <div class="bg-slate-50 px-5 py-3 border-b border-slate-200 flex justify-between items-center rounded-t-lg">
                <input type="text" class="sec-name font-semibold text-slate-800 bg-white border border-slate-200 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 rounded-lg px-3 py-1.5 w-full sm:w-3/4 text-base placeholder:text-slate-400 placeholder:font-normal outline-none transition-all shadow-sm" placeholder="Section Heading (e.g., Hematology Findings)">
                <button onclick="this.closest('.section-block').remove()" class="text-slate-400 hover:text-red-500 transition-colors p-1" title="Delete Section"><i class="fas fa-trash text-sm"></i></button>
            </div>
            
            <div class="p-0">
                <div class="px-5 py-3 border-b border-slate-100 bg-white">
                     <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Default Interpretation/Notes</label>
                     <textarea rows="1" class="sec-text w-full px-3 py-2 bg-white border border-slate-300 rounded-md focus:border-brand-500 text-sm text-slate-700 outline-none transition-all resize-none shadow-sm placeholder:text-slate-400" placeholder="Optional standard remarks/notes for this section..."></textarea>
                </div>

                <div class="hidden sm:grid grid-cols-12 gap-3 px-5 py-2 bg-slate-50/80 border-b border-slate-100 text-[10px] font-bold text-slate-500 uppercase tracking-widest shrink-0">
                    <div class="col-span-4 pl-2">Parameter Name</div>
                    <div class="col-span-2">Unit</div>
                    <div class="col-span-5 ml-1">Reference Range</div>
                    <div class="col-span-1 text-right"></div>
                </div>

                <div class="sec-params flex flex-col">
                    <!-- Param rows injected here -->
                </div>
                
                <div class="px-5 py-3 border-t border-slate-100 bg-white rounded-b-lg flex items-center">
                    <button type="button" onclick="addParamRow(this)" class="text-sm font-medium text-brand-600 hover:text-brand-800 transition-colors flex items-center">
                        <i class="fas fa-plus-circle mr-1.5"></i> Add Parameter Row
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template id="param-row-template">
        <div class="param-row flex flex-col sm:grid sm:grid-cols-12 gap-3 px-4 sm:px-5 py-4 sm:py-2 items-start sm:items-center border-b border-slate-50 hover:bg-slate-50 transition-colors group">
            <div class="w-full sm:col-span-4">
                <label class="sm:hidden text-[10px] font-bold text-slate-400 uppercase mb-1">Parameter Name</label>
                <input type="text" class="pr-name w-full bg-white border border-slate-200 focus:border-brand-400 rounded px-2 py-1.5 font-semibold text-slate-800 text-[13px] placeholder-slate-300 transition-all outline-none shadow-sm" placeholder="e.g. Hemoglobin">
            </div>
            <div class="w-full sm:col-span-2">
                <label class="sm:hidden text-[10px] font-bold text-slate-400 uppercase mb-1">Unit</label>
                <input type="text" class="pr-units w-full bg-white border border-slate-200 focus:border-brand-400 rounded px-2 py-1.5 text-xs text-slate-600 transition-all outline-none placeholder-slate-300 shadow-sm" placeholder="g/dL">
            </div>
            <div class="w-full sm:col-span-5 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-3">
                <div class="flex items-center gap-1.5 shrink-0">
                    <label class="relative inline-flex items-center cursor-pointer" title="Gender Specific Range">
                        <input type="checkbox" class="pr-is-gender sr-only peer" onchange="toggleGenderFields(this)">
                        <div class="w-7 h-4 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-brand-500"></div>
                        <span class="ml-1.5 text-[10px] font-bold text-slate-400 uppercase">M/F</span>
                    </label>
                </div>
                
                <div class="range-general flex flex-1 items-center gap-1.5">
                    <input type="number" step="any" class="pr-min w-14 sm:w-full max-w-[70px] px-2 py-1 bg-white border border-slate-200 rounded text-xs font-medium text-slate-700 outline-none focus:border-brand-400 shadow-sm placeholder-slate-300 text-center" placeholder="Min">
                    <span class="text-slate-400 text-xs">-</span>
                    <input type="number" step="any" class="pr-max w-14 sm:w-full max-w-[70px] px-2 py-1 bg-white border border-slate-200 rounded text-xs font-medium text-slate-700 outline-none focus:border-brand-400 shadow-sm placeholder-slate-300 text-center" placeholder="Max">
                </div>

                <div class="range-gender hidden flex-1 flex-col gap-1.5">
                    <div class="flex items-center gap-1.5">
                        <span class="text-[10px] font-extrabold text-blue-500 w-3">M</span>
                        <input type="number" step="any" class="pr-male-min w-12 sm:w-full max-w-[60px] px-1.5 py-0.5 bg-white border border-slate-200 rounded text-[11px] font-medium text-slate-700 outline-none focus:border-blue-400 shadow-sm placeholder-slate-300 text-center" placeholder="Min">
                        <span class="text-slate-400 text-[10px]">-</span>
                        <input type="number" step="any" class="pr-male-max w-12 sm:w-full max-w-[60px] px-1.5 py-0.5 bg-white border border-slate-200 rounded text-[11px] font-medium text-slate-700 outline-none focus:border-blue-400 shadow-sm placeholder-slate-300 text-center" placeholder="Max">
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="text-[10px] font-extrabold text-pink-500 w-3">F</span>
                        <input type="number" step="any" class="pr-female-min w-12 sm:w-full max-w-[60px] px-1.5 py-0.5 bg-white border border-slate-200 rounded text-[11px] font-medium text-slate-700 outline-none focus:border-pink-400 shadow-sm placeholder-slate-300 text-center" placeholder="Min">
                        <span class="text-slate-400 text-[10px]">-</span>
                        <input type="number" step="any" class="pr-female-max w-12 sm:w-full max-w-[60px] px-1.5 py-0.5 bg-white border border-slate-200 rounded text-[11px] font-medium text-slate-700 outline-none focus:border-pink-400 shadow-sm placeholder-slate-300 text-center" placeholder="Max">
                    </div>
                </div>
            </div>
            <div class="w-full sm:col-span-1 flex justify-end pt-2 sm:pt-0 border-t sm:border-0 border-slate-100">
                <button type="button" onclick="this.closest('.param-row').remove()" class="text-slate-400 hover:text-red-500 transition-colors p-1 flex items-center gap-2 text-xs font-medium sm:text-base opacity-100 sm:opacity-0 group-hover:opacity-100">
                    <i class="fas fa-trash-alt sm:hidden"></i>
                    <i class="fas fa-times hidden sm:block"></i>
                    <span class="sm:hidden text-red-500">Remove</span>
                </button>
            </div>
        </div>
    </template>

    <script src="js/layout.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCommonLayout();
            checkAuth();
            loadTemplates();

            const saveDraft = DraftManager.debounce(() => {
                if (document.getElementById('template-id').value) return; 
                const data = extractTemplateData();
                if (data.name || data.sections.length > 0) {
                    DraftManager.save('template', data);
                }
            }, 500);

            document.getElementById('t-name').addEventListener('input', saveDraft);
            document.getElementById('sections-container').addEventListener('input', saveDraft);

            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.has('edit')) {
                const draft = DraftManager.load('template');
                if (draft) {
                    document.getElementById('t-name').value = draft.name || '';
                    if (draft.sections && draft.sections.length > 0) {
                        document.getElementById('sections-container').innerHTML = '';
                        draft.sections.forEach(sec => {
                            const block = addSection();
                            block.querySelector('.sec-name').value = sec.sectionName || '';
                            block.querySelector('.sec-text').value = sec.defaultText || '';
                            if (sec.parameters) {
                                const addBtn = block.querySelector('button[onclick="addParamRow(this)"]');
                                sec.parameters.forEach(p => addParamRow(addBtn, p));
                            }
                        });
                    } else {
                        addSection(); 
                    }
                } else {
                    addSection(); 
                }
            }
        });

        async function loadTemplates() {
            const list = document.getElementById('templates-list');
            list.innerHTML = `<li class="p-6 text-center text-slate-400 flex flex-col items-center justify-center"><i class="fas fa-circle-notch fa-spin text-2xl mb-2"></i><span class="font-medium text-sm">Refreshing...</span></li>`;
            try {
                const res = await api.request('/templates');
                const data = res.data;
                
                if(data.length === 0) {
                    list.innerHTML = `<li class="p-8 text-center flex flex-col items-center justify-center h-full"><div class="bg-slate-50 p-3 rounded-full mb-2"><i class="fas fa-inbox text-xl text-slate-400"></i></div><p class="text-sm font-medium text-slate-600">No templates found.</p></li>`;
                    return;
                }

                list.innerHTML = data.map(t => {
                    const tJson = JSON.stringify(t).replace(/'/g, "\\'");
                    return `
                    <li class="px-5 py-3 hover:bg-slate-50 cursor-pointer flex justify-between items-center transition-all border-l-2 border-transparent hover:border-brand-500 group" onclick='prepareTemplateLoad(${tJson})'>
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center text-sm group-hover:bg-brand-50 group-hover:text-brand-600 transition-colors border border-slate-200"><i class="fas fa-file-alt"></i></div>
                            <div class="truncate max-w-[180px]">
                                <p class="font-medium text-slate-800 text-sm group-hover:text-brand-700 transition-colors truncate">${sanitizeHTML(t.templateName)}</p>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tight mt-0.5">${t.sections.length} ${t.sections.length === 1 ? 'section' : 'sections'}</p>
                            </div>
                        </div>
                        <button onclick="deleteTemplate(event, '${t._id}')" class="text-slate-300 hover:text-red-500 focus:outline-none p-1.5 rounded transition-colors opacity-0 group-hover:opacity-100" title="Delete Template"><i class="fas fa-trash text-sm"></i></button>
                    </li>
                `}).join('');
            } catch (err) {
                 UI.showToast('Failed to load templates from server', 'error');
                 list.innerHTML = `<li class="p-6 text-center text-red-500 font-medium text-sm">Error connecting to server.</li>`;
            }
        }

        function prepareTemplateLoad(t) {
            loadTemplateIntoEditor(t);
        }

        function createNewTemplate() {
            document.getElementById('template-id').value = '';
            document.getElementById('t-name').value = '';
            document.getElementById('editor-title').textContent = 'Create New Template';
            document.getElementById('editor-subtitle').textContent = 'Define sections and default parameters.';
            document.getElementById('sections-container').innerHTML = '';
            addSection();
        }

        function loadTemplateIntoEditor(t) {
            document.getElementById('template-id').value = t._id;
            document.getElementById('t-name').value = t.templateName;
            document.getElementById('editor-title').textContent = 'Edit Template Info';
            document.getElementById('editor-subtitle').innerHTML = `Currently modifying <span class="font-bold text-brand-600">${t.templateName}</span>`;
            
            const container = document.getElementById('sections-container');
            container.innerHTML = '';
            
            t.sections.forEach(sec => {
                const block = addSection();
                block.querySelector('.sec-name').value = sec.sectionName;
                block.querySelector('.sec-text').value = sec.defaultText || '';
                if (sec.parameters && Array.isArray(sec.parameters)) {
                    const addBtn = block.querySelector('button[onclick="addParamRow(this)"]');
                    sec.parameters.forEach(p => {
                        addParamRow(addBtn, p);
                    });
                } else if (sec.defaultValues && typeof sec.defaultValues === 'object') {
                    const addBtn = block.querySelector('button[onclick="addParamRow(this)"]');
                    for (const [k, v] of Object.entries(sec.defaultValues)) {
                        const legacyParam = { name: k };
                        if (typeof v === 'object' && v !== null) {
                            const rangeMatch = (v.normalRange || '').match(/([\d.]+)\s*[-–—]\s*([\d.]+)/);
                            legacyParam.units = (v.normalRange || '').replace(/[\d.\s-–—]+/g, '').trim();
                            legacyParam.normalRange = {
                                min: rangeMatch ? parseFloat(rangeMatch[1]) : null,
                                max: rangeMatch ? parseFloat(rangeMatch[2]) : null
                            };
                        }
                        addParamRow(addBtn, legacyParam);
                    }
                }
            });
        }

        function addSection() {
            const template = document.getElementById('section-template');
            const clone = template.content.cloneNode(true);
            const container = document.getElementById('sections-container');
            const wrapperDiv = document.createElement('div');
            wrapperDiv.classList.add('animate-fade-in-up');
            wrapperDiv.appendChild(clone);
            container.appendChild(wrapperDiv);
            
            setTimeout(() => {
                const newInputs = wrapperDiv.querySelectorAll('.sec-name');
                if(newInputs.length > 0) newInputs[newInputs.length-1].focus();
            }, 50);

            return wrapperDiv;
        }

        function toggleGenderFields(checkbox) {
            const row = checkbox.closest('.param-row');
            const general = row.querySelector('.range-general');
            const gender = row.querySelector('.range-gender');
            if (checkbox.checked) {
                general.classList.add('hidden');
                general.classList.remove('flex');
                gender.classList.remove('hidden');
                gender.classList.add('flex');
            } else {
                general.classList.remove('hidden');
                general.classList.add('flex');
                gender.classList.remove('flex');
                gender.classList.add('hidden');
            }
        }

        function addParamRow(btn, data = null) {
            const tpl = document.getElementById('param-row-template');
            const clone = tpl.content.cloneNode(true);
            const row = clone.querySelector('.param-row');

            if (data) {
                row.querySelector('.pr-name').value = data.name || '';
                row.querySelector('.pr-units').value = data.units || '';
                if (data.isGenderSpecific) {
                    const cb = row.querySelector('.pr-is-gender');
                    cb.checked = true;
                    toggleGenderFields(cb);
                    if (data.normalRange) {
                        if (data.normalRange.male) {
                            row.querySelector('.pr-male-min').value = data.normalRange.male.min ?? '';
                            row.querySelector('.pr-male-max').value = data.normalRange.male.max ?? '';
                        }
                        if (data.normalRange.female) {
                            row.querySelector('.pr-female-min').value = data.normalRange.female.min ?? '';
                            row.querySelector('.pr-female-max').value = data.normalRange.female.max ?? '';
                        }
                    }
                } else if (data.normalRange) {
                    row.querySelector('.pr-min').value = data.normalRange.min ?? '';
                    row.querySelector('.pr-max').value = data.normalRange.max ?? '';
                }
            }

            const paramsContainer = btn.closest('.p-0').querySelector('.sec-params');
            paramsContainer.appendChild(clone);
        }

        function extractTemplateData() {
            const name = document.getElementById('t-name').value;
            const sectionBlocks = document.querySelectorAll('.section-block');
            const sections = [];
            
            sectionBlocks.forEach(block => {
                const secName = block.querySelector('.sec-name').value;
                const secText = block.querySelector('.sec-text').value;
                const parameters = [];
                
                block.querySelectorAll('.param-row').forEach(row => {
                    const name = row.querySelector('.pr-name').value.trim();
                    if (!name) return;

                    const units = row.querySelector('.pr-units').value.trim();
                    const isGenderSpecific = row.querySelector('.pr-is-gender').checked;
                    
                    const param = { name, units, isGenderSpecific, normalRange: {} };
                    
                    if (isGenderSpecific) {
                        param.normalRange.male = {
                            min: parseFloat(row.querySelector('.pr-male-min').value) || null,
                            max: parseFloat(row.querySelector('.pr-male-max').value) || null
                        };
                        param.normalRange.female = {
                            min: parseFloat(row.querySelector('.pr-female-min').value) || null,
                            max: parseFloat(row.querySelector('.pr-female-max').value) || null
                        };
                    } else {
                        param.normalRange.min = parseFloat(row.querySelector('.pr-min').value) || null;
                        param.normalRange.max = parseFloat(row.querySelector('.pr-max').value) || null;
                    }
                    parameters.push(param);
                });
                
                sections.push({
                    sectionName: secName,
                    defaultText: secText,
                    parameters: parameters.length > 0 ? parameters : undefined
                });
            });

            return { name, sections };
        }

        async function saveTemplate() {
            const id = document.getElementById('template-id').value;
            const { name, sections } = extractTemplateData();
            
            if (!name) { 
                document.getElementById('t-name').focus();
                return UI.showToast('Template Master Name is required', 'error'); 
            }

            if (sections.length === 0) return UI.showToast('Please provide valid section details', 'error');

            UI.toggleLoader('btn-save-template', true, 'Saving...');

            try {
                if (id) {
                    await api.request(`/templates/${id}`, 'PUT', { templateName: name, sections });
                    UI.showToast('Template structure updated successfully', 'success');
                } else {
                    const res = await api.request('/templates', 'POST', { templateName: name, sections });
                    document.getElementById('template-id').value = res.data._id;
                    document.getElementById('editor-title').textContent = 'Edit Template Info';
                    document.getElementById('editor-subtitle').innerHTML = `Currently modifying <span class="font-bold text-brand-600">${name}</span>`;
                    UI.showToast('New template created successfully', 'success');
                }
                DraftManager.clear('template');
                loadTemplates();
            } catch (err) {
                UI.showToast(err.message, 'error');
            } finally {
                UI.toggleLoader('btn-save-template', false, '<i class="fas fa-save mr-2"></i> Save Template');
            }
        }

        async function deleteTemplate(e, id) {
             e.stopPropagation(); 
             const confirmed = await UI.showConfirm('Delete Template', 'Are you sure you want to delete this template? Future reports cannot use it.', 'Delete', 'danger');
             if (confirmed) {
                 try {
                     await api.request(`/templates/${id}`, 'DELETE');
                     UI.showToast('Template permanently deleted', 'success');
                     if(document.getElementById('template-id').value === id) {
                         createNewTemplate();
                     }
                     loadTemplates();
                 } catch (err) {
                     UI.showToast(err.message, 'error');
                 }
             }
        }

        if(!document.getElementById('custom-animations')) {
            const style = document.createElement('style');
            style.id = 'custom-animations';
            style.textContent = `
                @keyframes fadeInUp {
                    from { opacity: 0; transform: translateY(10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
                .animate-fade-in-up {
                    animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                }
            `;
            document.head.appendChild(style);
        }
    </script>
</body>
</html>
