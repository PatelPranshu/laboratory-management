<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPathoLabs - Premium LIS Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .auth-card {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .form-transition {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 antialiased selection:bg-brand-500 selection:text-white">

    <div class="auth-card max-w-5xl w-full rounded-[2rem] overflow-hidden flex relative z-10 mx-auto min-h-[600px]">
        
        <!-- Left Side: Branding -->
        <div class="hidden lg:flex flex-col justify-between w-5/12 p-12 bg-indigo-950 text-white relative overflow-hidden">
            <!-- Simplified background -->
            <div class="absolute inset-0 bg-brand-500/5"></div>
            
            <div class="relative z-10">
                <div class="inline-flex items-center justify-center p-4 bg-white/10 rounded-[2rem] mb-10 border border-white/10 shadow-xl group transition-transform duration-300 hover:scale-105">
                    <i class="fa-solid fa-microscope text-4xl text-brand-300 drop-shadow-[0_0_15px_rgba(14,165,233,0.5)] transition-all duration-500 group-hover:text-brand-100"></i>
                </div>
                <h1 class="text-5xl font-black mb-6 tracking-tighter leading-none uppercase">
                    MyPatho<br/>
                    <span class="text-brand-400 text-4xl tracking-widest font-bold">Labs</span>
                </h1>
                <div class="h-1 w-20 bg-gradient-to-r from-brand-500 to-transparent mb-8 rounded-full"></div>
                <p class="text-indigo-100/80 text-xl leading-relaxed max-w-sm font-medium">
                    Advanced diagnostic intelligence for <span class="text-white font-bold border-b-2 border-brand-500/50">modern laboratories.</span>
                </p>
            </div>
            
            <div class="relative z-10">
                <div class="flex items-center space-x-4 text-sm font-medium text-indigo-200/80">
                    <div class="flex items-center"><i class="fas fa-check-circle text-emerald-400 mr-2"></i> HIPAA Compliant</div>
                    <div class="flex items-center"><i class="fas fa-shield-alt text-brand-400 mr-2"></i> Encrypted</div>
                </div>
            </div>
        </div>

        <!-- Right Side: Forms -->
        <div class="w-full lg:w-7/12 p-8 sm:p-14 transition-custom flex flex-col justify-center bg-white" id="form-container">
            
            <!-- Login Form -->
            <div id="login-form" class="w-full max-w-md mx-auto form-transition">
                <div class="mb-10 text-center lg:text-left">
                    <h2 class="text-3xl font-bold text-slate-800 tracking-tight mb-2">Welcome Back</h2>
                    <p class="text-slate-500 font-medium">Enter your credentials to access your dashboard.</p>
                </div>

                <form onsubmit="handleAuth(event, 'login')" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-slate-400 group-focus-within:text-brand-500 transition-colors"></i>
                            </div>
                            <input type="email" id="login-email" required placeholder="admin@mypatholabs.com" class="block w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all font-medium text-slate-800 shadow-sm">
                        </div>
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-sm font-bold text-slate-700">Password</label>
                            <a href="#" class="text-sm font-semibold text-brand-600 hover:text-brand-500 transition-colors">Forgot password?</a>
                        </div>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-slate-400 group-focus-within:text-brand-500 transition-colors"></i>
                            </div>
                            <input type="password" id="login-password" required placeholder="••••••••" class="block w-full pl-11 pr-12 py-3.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all font-medium text-slate-800 shadow-sm">
                            <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                                <button type="button" onclick="togglePasswordVisibility('login-password', this)" class="text-slate-400 hover:text-brand-500 focus:outline-none transition-colors">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <button id="btn-login" type="submit" class="w-full flex justify-center py-3.5 px-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 shadow-lg shadow-brand-500/30 transform hover:-translate-y-0.5 transition-all duration-200">
                        Sign In <i class="fas fa-arrow-right ml-2 mt-0.5 text-xs"></i>
                    </button>
                </form>

                <p class="mt-8 text-center text-sm font-medium text-slate-500">
                    New to MyPathoLabs? 
                    <button onclick="toggleForm()" class="text-brand-600 hover:text-brand-800 font-bold ml-1 focus:outline-none transition-colors border-b-2 border-transparent hover:border-brand-600">Create Laboratory Account</button>
                </p>
            </div>

            <!-- Registration Form (Hidden by default) -->
            <div id="register-form" class="hidden w-full max-w-2xl mx-auto form-transition">
                 <div class="mb-8 text-center lg:text-left">
                    <h2 class="text-3xl font-bold text-slate-800 tracking-tight mb-2">Get Started</h2>
                    <p class="text-slate-500 font-medium">Create your laboratory account in seconds.</p>
                </div>

                <form onsubmit="handleAuth(event, 'register')" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Full Name</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                    <i class="fas fa-user text-slate-400 text-sm group-focus-within:text-brand-500 transition-colors"></i>
                                </div>
                                <input type="text" id="reg-name" required placeholder="Dr. John Doe" class="block w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all font-medium text-slate-800 shadow-sm text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Laboratory Name</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                    <i class="fas fa-hospital text-slate-400 text-sm group-focus-within:text-brand-500 transition-colors"></i>
                                </div>
                                <input type="text" id="reg-labName" required placeholder="MyPathoLabs Central" class="block w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all font-medium text-slate-800 shadow-sm text-sm">
                            </div>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Email Address</label>
                             <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                    <i class="fas fa-envelope text-slate-400 text-sm group-focus-within:text-brand-500 transition-colors"></i>
                                </div>
                                <input type="email" id="reg-email" required placeholder="admin@lab.com" class="block w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all font-medium text-slate-800 shadow-sm text-sm">
                            </div>
                        </div>
                        <!-- Role selection removed: public registrations are exclusively Admin -->
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Password</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                    <i class="fas fa-lock text-slate-400 text-sm group-focus-within:text-brand-500 transition-colors"></i>
                                </div>
                                <input type="password" id="reg-password" required minlength="6" placeholder="At least 6 chars" class="block w-full pl-10 pr-12 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all font-medium text-slate-800 shadow-sm text-sm">
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                                    <button type="button" onclick="togglePasswordVisibility('reg-password', this)" class="text-slate-400 hover:text-brand-500 focus:outline-none transition-colors">
                                        <i class="fas fa-eye text-xs"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Confirm Password</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                    <i class="fas fa-shield-alt text-slate-400 text-sm group-focus-within:text-brand-500 transition-colors"></i>
                                </div>
                                <input type="password" id="reg-confirm-password" required minlength="6" placeholder="Repeat password" class="block w-full pl-10 pr-12 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all font-medium text-slate-800 shadow-sm text-sm">
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                                    <button type="button" onclick="togglePasswordVisibility('reg-confirm-password', this)" class="text-slate-400 hover:text-brand-500 focus:outline-none transition-colors">
                                        <i class="fas fa-eye text-xs"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button id="btn-register" type="submit" class="w-full flex justify-center py-3.5 px-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 shadow-lg shadow-emerald-500/30 transform hover:-translate-y-0.5 transition-all duration-200 mt-4">
                        Create Account
                    </button>
                </form>

                <p class="mt-6 text-center text-sm font-medium text-slate-500">
                    Already have an account? 
                    <button onclick="toggleForm()" class="text-brand-600 hover:text-brand-800 font-bold ml-1 focus:outline-none transition-colors border-b-2 border-transparent hover:border-brand-600">Sign in instead</button>
                </p>
            </div>

        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('lis_token')) {
            window.location.href = 'dashboard.html';
        }

        function toggleForm() {
            const loginSection = document.getElementById('login-form');
            const registerSection = document.getElementById('register-form');
            
            if (loginSection.classList.contains('hidden')) {
                // Show Login
                registerSection.classList.add('hidden');
                registerSection.classList.remove('fade-enter-active');
                
                loginSection.classList.remove('hidden');
                loginSection.classList.add('fade-enter');
                setTimeout(() => {
                    loginSection.classList.remove('fade-enter');
                    loginSection.classList.add('fade-enter-active');
                }, 10);
                
            } else {
                // Show Register
                loginSection.classList.add('hidden');
                loginSection.classList.remove('fade-enter-active');
                
                registerSection.classList.remove('hidden');
                registerSection.classList.add('fade-enter');
                setTimeout(() => {
                    registerSection.classList.remove('fade-enter');
                    registerSection.classList.add('fade-enter-active');
                }, 10);
            }
        }



        async function handleAuth(e, type) {
            e.preventDefault();
            
            try {
                if (type === 'login') {
                    UI.toggleLoader('btn-login', true, '<i class="fas fa-circle-notch fa-spin mr-2"></i> Authenticating...');
                    const email = document.getElementById('login-email').value;
                    const password = document.getElementById('login-password').value;
                    
                    const res = await api.login(email, password);
                    
                    localStorage.setItem('lis_token', res.token);
                    localStorage.setItem('lis_user', JSON.stringify(res.user));
                    
                    UI.showToast('Login Successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = res.user.mustChangePassword ? 'reset-password.html' : 'dashboard.html';
                    }, 1000);
                    
                } else if (type === 'register') {
                    UI.toggleLoader('btn-register', true, '<i class="fas fa-circle-notch fa-spin mr-2"></i> Creating Account...');
                    const labName = document.getElementById('reg-labName').value;
                    const name = document.getElementById('reg-name').value;
                    const email = document.getElementById('reg-email').value;
                    const password = document.getElementById('reg-password').value;
                    const confirmPassword = document.getElementById('reg-confirm-password').value;
                    const role = 'Admin'; // Only Admins can register publicly

                    if (password !== confirmPassword) {
                        UI.showToast('Passwords do not match', 'error');
                        UI.toggleLoader('btn-register', false, 'Create Account');
                        return;
                    }
                    
                    const res = await api.register({ labName, name, email, password, role });
                    
                    localStorage.setItem('lis_token', res.token);
                    localStorage.setItem('lis_user', JSON.stringify(res.user));
                    
                    UI.showToast('Account Created! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                }
            } catch (err) {
                UI.showToast(err.message || 'Authentication failed', 'error');
                const btnId = type === 'login' ? 'btn-login' : 'btn-register';
                const originalText = type === 'login' ? 'Sign In <i class="fas fa-arrow-right ml-2 mt-0.5 text-xs"></i>' : 'Create Account';
                UI.toggleLoader(btnId, false, originalText);
            }
        }
    </script>
</body>
</html>
