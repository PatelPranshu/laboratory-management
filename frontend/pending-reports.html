<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Reports - MyPathoLabs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased h-full overflow-hidden">
    
    <div id="toast-container" class="fixed top-5 right-5 z-[200] flex flex-col gap-3"></div>

    <div class="flex h-screen overflow-hidden bg-slate-50">
        <!-- Sidebar Layout Injected via JS -->
        
        <main class="flex-1 flex flex-col relative overflow-hidden h-full">
            
            <!-- Header (Solid & Consistent) -->
            <header class="bg-white border-b border-slate-200 px-8 py-5 flex items-center justify-between z-50 shrink-0">
                <div>
                    <nav class="flex text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">
                        <ol class="flex items-center space-x-2">
                            <li class="hover:text-brand-600 transition-colors"><a href="dashboard.html">Dashboard</a></li>
                            <li><i class="fas fa-chevron-right text-[10px] opacity-40"></i></li>
                            <li class="text-slate-600">Verification Queue</li>
                        </ol>
                    </nav>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Pending Reports</h1>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto custom-scrollbar bg-slate-50/50 p-4 sm:p-8">
                <div class="max-w-[1400px] mx-auto space-y-8">
                    
                    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
                        <div>
                            <h2 class="text-2xl font-black text-slate-900 tracking-tight flex items-center">
                                <i class="fas fa-clock text-brand-500 mr-4"></i>
                                Pending Verification
                            </h2>
                            <p class="text-slate-500 mt-2 text-sm font-medium max-w-xl">Reports currently in draft mode awaiting signature or specialist review.</p>
                        </div>
                    </div>

                    <!-- Table Container (Clean & Large) -->
                    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
                        <div class="overflow-x-auto min-h-[500px]">
                            <table class="w-full text-left border-collapse">
                                <thead class="text-xs text-slate-400 bg-slate-50 border-b border-slate-100 uppercase font-black tracking-widest">
                                    <tr>
                                        <th scope="col" class="px-8 py-5">Draft Date</th>
                                        <th scope="col" class="px-8 py-5">Patient Details</th>
                                        <th scope="col" class="px-8 py-5">Prepared By</th>
                                        <th scope="col" class="px-8 py-5">Assigned Verifier</th>
                                        <th scope="col" class="px-8 py-5 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="pending-table-body" class="divide-y divide-slate-100">
                                    <tr>
                                        <td colspan="5" class="px-8 py-20 text-center text-slate-300">
                                            <i class="fas fa-spinner fa-spin text-2xl mb-4 block text-brand-500"></i>
                                            <span class="text-sm font-bold uppercase tracking-widest">Accessing Document Queue...</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Core Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/pending-reports.js"></script>
</body>
</html>
