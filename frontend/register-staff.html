<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Invitation - MyPathoLabs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 antialiased text-slate-800">
    <div class="min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
        
        <!-- Simplified Background -->
        <div class="absolute inset-0 bg-brand-500/5 -z-10"></div>

        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[2rem] shadow-xl border border-slate-100 relative z-10 transition-shadow duration-300" id="card-container">
            
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-brand-50 to-brand-100 shadow-sm border border-brand-200/50 mb-6 group transition-all duration-300">
                    <i class="fas fa-check-circle text-4xl text-brand-500 group-hover:text-brand-600 transition-colors"></i>
                </div>
                <!-- Animated Title -->
                <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2" id="title-text">Verify Invite</h2>
                <p class="text-sm text-slate-500 mb-8 max-w-xs mx-auto font-medium" id="subtitle-text">Please wait while we verify your invitation token...</p>
            </div>

            <!-- Loader initially -->
            <div id="loader" class="flex justify-center my-8">
                <i class="fas fa-spinner fa-spin text-3xl text-brand-500"></i>
            </div>

            <form id="register-form" class="mt-8 space-y-5 hidden" onsubmit="handleRegistration(event)">
                <div class="bg-indigo-50/50 border border-indigo-100 p-4 rounded-xl mb-6">
                    <p class="text-xs text-indigo-800/60 font-bold uppercase tracking-wider mb-1">Invited As</p>
                    <p class="text-sm font-bold text-indigo-900" id="invite-email-display"></p>
                    <p class="text-xs font-bold text-brand-600 mt-1" id="invite-role-display"></p>
                </div>

                <input type="hidden" id="invite-token" name="token">

                <div>
                    <label for="name" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Full Name</label>
                    <input id="name" name="name" type="text" required class="appearance-none block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium text-sm hover:border-slate-300" placeholder="Dr. John Doe">
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Enter Password</label>
                    <div class="relative group">
                        <input id="password" name="password" type="password" required class="appearance-none block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium text-sm hover:border-slate-300" placeholder="Min. 8 characters, 1 uppercase, 1 number">
                        <button type="button" onclick="togglePasswordVisibility('password', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-brand-500 focus:outline-none transition-colors">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Confirm Password</label>
                    <div class="relative group">
                        <input id="confirm-password" name="confirm-password" type="password" required class="appearance-none block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium text-sm hover:border-slate-300" placeholder="Re-enter your password">
                        <button type="button" onclick="togglePasswordVisibility('confirm-password', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-brand-500 focus:outline-none transition-colors">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="signature-container" class="hidden">
                    <label class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Digital Signature URL (Optional)</label>
                    <input id="signature-url" type="url" class="appearance-none block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-medium text-sm hover:border-slate-300" placeholder="https://res.cloudinary.com/...">
                    <p class="text-[10px] text-slate-500 mt-2 ml-1">You can add or update your signature later in settings.</p>
                </div>

                <button type="submit" id="btn-submit" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 shadow-lg shadow-brand-500/30 transition-all mt-8">
                    Create Account
                    <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div id="error-container" class="mt-8 space-y-5 hidden text-center">
                 <div class="p-4 bg-red-50 text-red-600 rounded-xl text-sm font-bold border border-red-100" id="error-msg">
                     Invalid token.
                 </div>
                 <a href="index.html" class="inline-block mt-4 text-sm font-bold text-slate-500 hover:text-brand-600 transition-colors">Go back home</a>
            </div>

        </div>
    </div>

    <!-- Centralized JS -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/register-staff.js"></script>
</body>
</html>
