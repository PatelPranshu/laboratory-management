<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Templates - CureLIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 antialiased text-slate-800 selection:bg-brand-500 selection:text-white">

    <div class="flex h-screen overflow-hidden bg-slate-100">
        
        <!-- Sidebar Layout Injected via JS -->

        <!-- Main Content -->
        <main class="flex-1 relative overflow-y-auto focus:outline-none custom-scrollbar pb-12">
            
            <!-- Top Header -->
            <header class="bg-white border-b border-slate-200 flex items-center justify-between px-8 py-5 sticky top-0 z-10">
                <div class="flex-1 w-full max-w-2xl flex relative opacity-0">
                    <!-- Placeholder to keep layout even -->
                </div>
                <!-- Breadcrumbs -->
                <nav class="flex absolute left-8 top-1/2 transform -translate-y-1/2" aria-label="Breadcrumb">
                  <ol class="inline-flex items-center space-x-1 md:space-x-3 text-sm font-medium">
                    <li class="inline-flex items-center text-slate-500 hover:text-brand-600 transition-colors">
                      <a href="dashboard.html" class="inline-flex items-center"><i class="fas fa-home mr-2"></i>Dashboard</a>
                    </li>
                    <li>
                      <div class="flex items-center">
                        <i class="fas fa-chevron-right text-slate-400 text-xs mx-2"></i>
                        <span class="text-slate-800 font-bold">Report Templates</span>
                      </div>
                    </li>
                  </ol>
                </nav>
            </header>

            <div class="px-8 py-8 max-w-[1800px] mx-auto flex flex-col xl:flex-row gap-8 xl:items-start">
            <!-- Left Side: List of Templates -->
            <div class="w-full xl:w-1/3 flex flex-col pt-0 xl:sticky xl:top-0">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Report Templates</h1>
                        <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest font-bold">Standardized Tests</p>
                    </div>
                    <button onclick="createNewTemplate()" class="bg-white border border-slate-200 text-brand-600 hover:bg-brand-50 hover:text-brand-700 p-2.5 rounded-xl shadow-sm transition-all transform hover:-translate-y-0.5 focus:outline-none tooltip-container" title="Create New Template">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                
                <div class="glass-card overflow-hidden flex-1 shadow-md border-slate-200/60 max-h-[calc(100vh-160px)] flex flex-col">
                     <div class="px-5 py-4 border-b border-slate-100/50 bg-white/40 flex items-center shadow-sm z-10">
                        <i class="fas fa-list-ul text-brand-500 mr-3"></i>
                        <h2 class="text-sm font-bold text-slate-800 uppercase tracking-widest">Saved Inventory</h2>
                    </div>
                    <div class="overflow-y-auto flex-1 custom-scrollbar bg-white/30">
                        <ul id="templates-list" class="divide-y divide-slate-100">
                            <li class="p-8 text-center text-slate-500 flex flex-col items-center justify-center h-full">
                                <i class="fas fa-circle-notch fa-spin text-3xl mb-3 text-brand-400"></i>
                                <span class="font-medium text-sm">Loading templates...</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Right Side: Template Editor -->
            <div class="w-full xl:w-2/3 flex flex-col pt-0 pb-12">
                 <div class="glass-card p-0 flex flex-col border border-brand-100/50 shadow-lg min-h-[600px] overflow-hidden">
                    <div class="px-8 py-6 flex justify-between items-center border-b border-slate-100 bg-white/50 rounded-t-xl">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800 tracking-tight" id="editor-title">Create New Template</h2>
                            <p class="text-sm font-medium text-slate-500 mt-0.5" id="editor-subtitle">Define sections and default parameters.</p>
                        </div>
                        <button id="btn-save-template" onclick="saveTemplate()" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white px-6 py-2.5 rounded-xl shadow-lg shadow-emerald-500/30 transition-all font-bold transform hover:-translate-y-0.5 focus:outline-none">
                            <i class="fas fa-save mr-2"></i> Save Template
                        </button>
                    </div>
                    
                    <div class="p-8 flex-1 flex flex-col bg-slate-50/30">
                        <input type="hidden" id="template-id">
                        
                        <div class="mb-8">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Template Master Name <span class="text-red-500">*</span></label>
                            <div class="relative group">
                                <input type="text" id="t-name" placeholder="e.g. Comprehensive Metabolic Panel (CMP)" class="w-full px-5 py-4 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all text-xl font-bold text-slate-800 shadow-sm placeholder-slate-300">
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none opacity-0 group-focus-within:opacity-100 transition-opacity">
                                    <i class="fas fa-pen text-brand-400"></i>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mb-6 mt-4">
                            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest flex items-center">
                                <i class="fas fa-layer-group mr-2 text-slate-400"></i> Document Sections
                            </h3>
                            <button onclick="addSection()" class="bg-white border text-sm border-brand-200 text-brand-600 hover:bg-brand-50 px-4 py-2 rounded-lg shadow-sm font-bold transition-all focus:outline-none flex items-center">
                                <i class="fas fa-plus text-xs mr-2"></i> Add Section
                            </button>
                        </div>

                        <div id="sections-container" class="space-y-6 flex-1 pb-10">
                            <!-- Sections injected here -->
                        </div>
                    </div>
                 </div>
            </div>
            </div>

        </main>
    </div>

    <!-- Section Template HTML (Hidden) -->
    <template id="section-template">
        <div class="section-block bg-white border border-slate-200 rounded-xl p-6 relative group shadow-sm hover:shadow-md transition-shadow">
            <!-- Decorative accent -->
            <div class="absolute inset-y-0 left-0 w-1.5 bg-indigo-400 rounded-l-xl opacity-50 group-hover:opacity-100 transition-opacity"></div>
            
            <button onclick="this.closest('.section-block').remove()" class="absolute top-5 right-5 text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors focus:outline-none" title="Remove Section">
                <i class="fas fa-trash-alt"></i>
            </button>
            
            <div class="mb-5 border-b border-slate-100 pb-4 pr-12">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Section Title</label>
                <input type="text" placeholder="e.g. Hematology Findings" class="sec-name w-1/2 min-w-[300px] px-0 py-1 bg-transparent border-b-2 border-slate-200 hover:border-slate-300 focus:outline-none focus:border-brand-500 text-lg font-bold text-slate-800 transition-colors placeholder-slate-300 block">
            </div>
            
            <div class="mb-5">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                     <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3"><i class="fas fa-comment-alt text-slate-400 mr-2 border-r border-slate-300 pr-2"></i> Default Remarks</label>
                     <textarea rows="3" class="sec-text w-full px-4 py-3 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30 text-sm font-medium text-slate-700 shadow-inner resize-none transition-all placeholder-slate-300" placeholder="Optional standard notes..."></textarea>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 flex items-center justify-between">
                    <span><i class="fas fa-list-check text-slate-400 mr-2 border-r border-slate-300 pr-2"></i> Parameters &amp; Values</span>
                </label>
                <div class="sec-params space-y-2">
                    <!-- Param rows injected here -->
                </div>
                <button type="button" onclick="addParamRow(this)" class="mt-3 inline-flex items-center px-3 py-1.5 border border-brand-200 shadow-sm text-xs font-bold rounded-lg text-brand-600 bg-brand-50 hover:bg-brand-100 focus:outline-none transition-colors">
                    <i class="fas fa-plus mr-1.5"></i> Add Parameter
                </button>
            </div>
        </div>
    </template>

    <!-- Parameter Row Template -->
    <template id="param-row-template">
        <div class="param-row bg-slate-50/50 p-4 rounded-xl border border-slate-100 mb-2">
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Parameter Name</label>
                    <input type="text" class="pr-name w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-slate-700 focus:ring-2 focus:ring-brand-500/40 outline-none transition-all" placeholder="e.g. Hemoglobin">
                </div>
                <div class="w-24">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Units</label>
                    <input type="text" class="pr-units w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 focus:ring-2 focus:ring-brand-500/40 outline-none transition-all" placeholder="g/dL">
                </div>
                <div class="flex items-end h-[52px]">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="pr-is-gender w-4 h-4 text-brand-600 border-slate-300 rounded focus:ring-brand-500" onchange="toggleGenderFields(this)">
                        <span class="ml-2 text-xs font-bold text-slate-500 group-hover:text-brand-600 transition-colors">Gender Specific</span>
                    </label>
                </div>
                <div class="flex-shrink-0 ml-auto">
                    <button type="button" onclick="this.closest('.param-row').remove()" class="text-slate-300 hover:text-red-500 p-2 rounded-lg transition-colors hover:bg-red-50"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>

            <!-- Range Specifics -->
            <div class="mt-3 pt-3 border-t border-slate-100 flex flex-wrap gap-4">
                <!-- General Range (Visible by default) -->
                <div class="range-general flex items-center gap-3">
                    <div class="w-24">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Min</label>
                        <input type="number" step="any" class="pr-min w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-brand-700 focus:ring-2 focus:ring-brand-500/40 outline-none" placeholder="0.0">
                    </div>
                    <span class="text-slate-300 text-xs mt-4">—</span>
                    <div class="w-24">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-tight mb-1">Max</label>
                        <input type="number" step="any" class="pr-max w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-brand-700 focus:ring-2 focus:ring-brand-500/40 outline-none" placeholder="0.0">
                    </div>
                </div>

                <!-- Gender Specific Ranges (Hidden by default) -->
                <div class="range-gender hidden flex-wrap gap-6">
                    <div class="flex items-center gap-3 p-2 bg-blue-50/50 rounded-lg border border-blue-100">
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest w-8">Male</span>
                        <div class="w-20">
                            <input type="number" step="any" class="pr-male-min w-full px-2 py-1.5 bg-white border border-blue-200 rounded-md text-xs font-bold text-blue-700 outline-none" placeholder="Min">
                        </div>
                        <span class="text-blue-200 text-xs">—</span>
                        <div class="w-20">
                            <input type="number" step="any" class="pr-male-max w-full px-2 py-1.5 bg-white border border-blue-200 rounded-md text-xs font-bold text-blue-700 outline-none" placeholder="Max">
                        </div>
                    </div>
                    <div class="flex items-center gap-3 p-2 bg-pink-50/50 rounded-lg border border-pink-100">
                        <span class="text-[10px] font-black text-pink-500 uppercase tracking-widest w-8">Female</span>
                        <div class="w-20">
                            <input type="number" step="any" class="pr-female-min w-full px-2 py-1.5 bg-white border border-pink-200 rounded-md text-xs font-bold text-pink-700 outline-none" placeholder="Min">
                        </div>
                        <span class="text-pink-200 text-xs">—</span>
                        <div class="w-20">
                            <input type="number" step="any" class="pr-female-max w-full px-2 py-1.5 bg-white border border-pink-200 rounded-md text-xs font-bold text-pink-700 outline-none" placeholder="Max">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="js/layout.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCommonLayout();
            checkAuth();
            loadTemplates();

            // Auto-save listeners
            const saveDraft = DraftManager.debounce(() => {
                if (document.getElementById('template-id').value) return; // Don't draft in edit mode
                const data = extractTemplateData();
                if (data.name || data.sections.length > 0) {
                    DraftManager.save('template', data);
                }
            }, 500);

            document.getElementById('t-name').addEventListener('input', saveDraft);
            document.getElementById('sections-container').addEventListener('input', saveDraft);

            // Restore draft if not in edit mode
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.has('edit')) {
                const draft = DraftManager.load('template');
                if (draft) {
                    document.getElementById('t-name').value = draft.name || '';
                    if (draft.sections && draft.sections.length > 0) {
                        document.getElementById('sections-container').innerHTML = '';
                        draft.sections.forEach(sec => {
                            const block = addSection();
                            block.querySelector('.sec-name').value = sec.sectionName || '';
                            block.querySelector('.sec-text').value = sec.defaultText || '';
                            if (sec.parameters) {
                                const addBtn = block.querySelector('button[onclick="addParamRow(this)"]');
                                sec.parameters.forEach(p => addParamRow(addBtn, p));
                            }
                        });
                    } else {
                        addSection(); // Start with one empty section if no sections in draft
                    }
                } else {
                    addSection(); // Start with one empty section if no draft
                }
            }
        });

        async function loadTemplates() {
            const list = document.getElementById('templates-list');
            list.innerHTML = `<li class="p-8 text-center text-slate-500 flex flex-col items-center justify-center h-full"><i class="fas fa-circle-notch fa-spin text-3xl mb-3 text-brand-400"></i><span class="font-medium text-sm">Refreshing...</span></li>`;
            try {
                const res = await api.request('/templates');
                const data = res.data;
                
                if(data.length === 0) {
                    list.innerHTML = `<li class="p-8 text-center flex flex-col items-center justify-center h-full"><div class="bg-slate-100 p-4 rounded-full mb-3"><i class="fas fa-inbox text-2xl text-slate-400"></i></div><p class="text-sm font-bold text-slate-600">No templates found.</p><p class="text-xs text-slate-400 mt-1">Create one using the editor.</p></li>`;
                    return;
                }

                list.innerHTML = data.map(t => `
                    <li class="p-5 hover:bg-brand-50/50 cursor-pointer flex justify-between items-center transition-all border-l-4 border-transparent hover:border-brand-500 group" onclick='loadTemplateIntoEditor(${JSON.stringify(t).replace(/'/g, "&#39;")})'>
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-500 flex items-center justify-center mr-4 border border-indigo-100 font-bold text-sm group-hover:bg-brand-100 group-hover:text-brand-600 transition-colors shadow-sm"><i class="fas fa-file-contract"></i></div>
                            <div>
                                <p class="font-bold text-slate-800 text-sm group-hover:text-brand-700 transition-colors line-clamp-1">${t.templateName}</p>
                                <p class="text-xs font-medium text-slate-500 mt-1 bg-slate-100 inline-block px-2 py-0.5 rounded-md"><i class="fas fa-layer-group mr-1.5 opacity-60"></i>${t.sections.length} ${t.sections.length === 1 ? 'section' : 'sections'}</p>
                            </div>
                        </div>
                        <button onclick="deleteTemplate(event, '${t._id}')" class="text-slate-300 hover:text-red-500 focus:outline-none p-2 rounded-lg hover:bg-red-50 transition-colors opacity-0 group-hover:opacity-100"><i class="fas fa-trash-alt"></i></button>
                    </li>
                `).join('');
            } catch (err) {
                 UI.showToast('Failed to load templates from server', 'error');
                 list.innerHTML = `<li class="p-8 text-center text-red-500 font-bold text-sm">Error connecting to server.</li>`;
            }
        }

        function createNewTemplate() {
            document.getElementById('template-id').value = '';
            document.getElementById('t-name').value = '';
            document.getElementById('editor-title').textContent = 'Create New Template';
            document.getElementById('editor-subtitle').textContent = 'Define sections and default parameters.';
            document.getElementById('sections-container').innerHTML = '';
            addSection();
        }

        function loadTemplateIntoEditor(t) {
            document.getElementById('template-id').value = t._id;
            document.getElementById('t-name').value = t.templateName;
            document.getElementById('editor-title').textContent = 'Edit Template Info';
            document.getElementById('editor-subtitle').innerHTML = `Currently modifying <span class="font-bold text-brand-600">${t.templateName}</span>`;
            
            const container = document.getElementById('sections-container');
            container.innerHTML = '';
            
            t.sections.forEach(sec => {
                const block = addSection();
                block.querySelector('.sec-name').value = sec.sectionName;
                block.querySelector('.sec-text').value = sec.defaultText || '';
                // Populate param rows from parameters array
                if (sec.parameters && Array.isArray(sec.parameters)) {
                    const addBtn = block.querySelector('button[onclick="addParamRow(this)"]');
                    sec.parameters.forEach(p => {
                        addParamRow(addBtn, p);
                    });
                } else if (sec.defaultValues && typeof sec.defaultValues === 'object') {
                    // Backward compatibility for old format
                    const addBtn = block.querySelector('button[onclick="addParamRow(this)"]');
                    for (const [k, v] of Object.entries(sec.defaultValues)) {
                        const legacyParam = { name: k };
                        if (typeof v === 'object' && v !== null) {
                            // Extract numbers if possible from string "14 - 16 g%"
                            const rangeMatch = (v.normalRange || '').match(/([\d.]+)\s*[-–—]\s*([\d.]+)/);
                            legacyParam.units = (v.normalRange || '').replace(/[\d.\s-–—]+/g, '').trim();
                            legacyParam.normalRange = {
                                min: rangeMatch ? parseFloat(rangeMatch[1]) : null,
                                max: rangeMatch ? parseFloat(rangeMatch[2]) : null
                            };
                        }
                        addParamRow(addBtn, legacyParam);
                    }
                }
            });
        }

        function addSection() {
            const template = document.getElementById('section-template');
            const clone = template.content.cloneNode(true);
            const container = document.getElementById('sections-container');
            const wrapperDiv = document.createElement('div');
            wrapperDiv.classList.add('animate-fade-in-up');
            wrapperDiv.appendChild(clone);
            container.appendChild(wrapperDiv);
            
            setTimeout(() => {
                const newInputs = wrapperDiv.querySelectorAll('.sec-name');
                if(newInputs.length > 0) newInputs[newInputs.length-1].focus();
            }, 50);

            return wrapperDiv;
        }

        function toggleGenderFields(checkbox) {
            const row = checkbox.closest('.param-row');
            const general = row.querySelector('.range-general');
            const gender = row.querySelector('.range-gender');
            if (checkbox.checked) {
                general.classList.add('hidden');
                gender.classList.remove('hidden');
                gender.classList.add('flex');
            } else {
                general.classList.remove('hidden');
                gender.classList.remove('flex');
                gender.classList.add('hidden');
            }
        }

        function addParamRow(btn, data = null) {
            const tpl = document.getElementById('param-row-template');
            const clone = tpl.content.cloneNode(true);
            const row = clone.querySelector('.param-row');

            if (data) {
                row.querySelector('.pr-name').value = data.name || '';
                row.querySelector('.pr-units').value = data.units || '';
                if (data.isGenderSpecific) {
                    const cb = row.querySelector('.pr-is-gender');
                    cb.checked = true;
                    toggleGenderFields(cb);
                    if (data.normalRange) {
                        if (data.normalRange.male) {
                            row.querySelector('.pr-male-min').value = data.normalRange.male.min ?? '';
                            row.querySelector('.pr-male-max').value = data.normalRange.male.max ?? '';
                        }
                        if (data.normalRange.female) {
                            row.querySelector('.pr-female-min').value = data.normalRange.female.min ?? '';
                            row.querySelector('.pr-female-max').value = data.normalRange.female.max ?? '';
                        }
                    }
                } else if (data.normalRange) {
                    row.querySelector('.pr-min').value = data.normalRange.min ?? '';
                    row.querySelector('.pr-max').value = data.normalRange.max ?? '';
                }
            }

            // Insert before the Add button, inside the sec-params container
            const paramsContainer = btn.previousElementSibling;
            paramsContainer.appendChild(clone);
        }

        function extractTemplateData() {
            const name = document.getElementById('t-name').value;
            const sectionBlocks = document.querySelectorAll('.section-block');
            const sections = [];
            
            sectionBlocks.forEach(block => {
                const secName = block.querySelector('.sec-name').value;
                const secText = block.querySelector('.sec-text').value;
                const parameters = [];
                
                block.querySelectorAll('.param-row').forEach(row => {
                    const name = row.querySelector('.pr-name').value.trim();
                    if (!name) return;

                    const units = row.querySelector('.pr-units').value.trim();
                    const isGenderSpecific = row.querySelector('.pr-is-gender').checked;
                    
                    const param = { name, units, isGenderSpecific, normalRange: {} };
                    
                    if (isGenderSpecific) {
                        param.normalRange.male = {
                            min: parseFloat(row.querySelector('.pr-male-min').value) || null,
                            max: parseFloat(row.querySelector('.pr-male-max').value) || null
                        };
                        param.normalRange.female = {
                            min: parseFloat(row.querySelector('.pr-female-min').value) || null,
                            max: parseFloat(row.querySelector('.pr-female-max').value) || null
                        };
                    } else {
                        param.normalRange.min = parseFloat(row.querySelector('.pr-min').value) || null;
                        param.normalRange.max = parseFloat(row.querySelector('.pr-max').value) || null;
                    }
                    parameters.push(param);
                });
                
                sections.push({
                    sectionName: secName,
                    defaultText: secText,
                    parameters: parameters.length > 0 ? parameters : undefined
                });
            });

            return { name, sections };
        }

        async function saveTemplate() {
            const id = document.getElementById('template-id').value;
            const { name, sections } = extractTemplateData();
            
            if (!name) { 
                document.getElementById('t-name').focus();
                return UI.showToast('Template Master Name is required', 'error'); 
            }

            if (sections.length === 0) return UI.showToast('Please provide valid section details', 'error');

            UI.toggleLoader('btn-save-template', true, '<i class="fas fa-circle-notch fa-spin mr-2"></i> Saving...');

            try {
                if (id) {
                    await api.request(`/templates/${id}`, 'PUT', { templateName: name, sections });
                    UI.showToast('Template structure updated successfully', 'success');
                } else {
                    const res = await api.request('/templates', 'POST', { templateName: name, sections });
                    document.getElementById('template-id').value = res.data._id;
                    document.getElementById('editor-title').textContent = 'Edit Template Info';
                    document.getElementById('editor-subtitle').innerHTML = `Currently modifying <span class="font-bold text-brand-600">${name}</span>`;
                    UI.showToast('New template created successfully', 'success');
                }
                DraftManager.clear('template');
                loadTemplates();
            } catch (err) {
                UI.showToast(err.message, 'error');
            } finally {
                UI.toggleLoader('btn-save-template', false, 'Save Template Master');
            }
        }

        async function deleteTemplate(e, id) {
             e.stopPropagation(); // prevent loading to editor
             if (confirm('Are you ABSOLUTELY sure you want to delete this template? Future reports cannot use it.')) {
                 try {
                     await api.request(`/templates/${id}`, 'DELETE');
                     UI.showToast('Template permanently deleted', 'success');
                     if(document.getElementById('template-id').value === id) {
                         createNewTemplate();
                     }
                     loadTemplates();
                 } catch (err) {
                     UI.showToast(err.message, 'error');
                 }
             }
        }

        // Add missing animation class
        if(!document.getElementById('custom-animations')) {
            const style = document.createElement('style');
            style.id = 'custom-animations';
            style.textContent = `
                @keyframes fadeInUp {
                    from { opacity: 0; transform: translateY(10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
                .animate-fade-in-up {
                    animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                }
            `;
            document.head.appendChild(style);
        }
    </script>
</body>
</html>
